# _bootstrap-infra.yml — reusable workflow.
#
# Stage 0 of the layered CI pipeline: brings up the artifact-distribution
# plane (file_registry, file_registry_frontend, realm_installer) on the
# target network. For the `local` network it spins up a clean replica
# inside the runner; for `staging` / `ic` it just verifies the
# pre-existing canisters respond and writes their ids out as JSON.
#
# Outputs:
#   infra-ids: JSON object {file_registry, file_registry_frontend, realm_installer}

name: _bootstrap-infra

on:
  workflow_call:
    inputs:
      network:
        description: "Target network: local | staging | ic"
        required: true
        type: string
      descriptor:
        description: "Path to v2 mundus descriptor (e.g. deployments/local-mundus.yml)"
        required: true
        type: string
    outputs:
      infra-ids:
        description: "JSON {file_registry, file_registry_frontend, realm_installer}"
        value: ${{ jobs.bootstrap.outputs.infra-ids }}
    secrets:
      IC_IDENTITY_PEM:
        required: false

env:
  PYTHON_VERSION: "3.10"
  DFX_VERSION: "0.31.0"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      infra-ids: ${{ steps.write.outputs.json }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx ${{ env.DFX_VERSION }}
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install Python deps
        run: |
          pip install pyyaml
          pip install -r requirements.txt

      - name: Configure dfx identity (non-local only)
        if: ${{ inputs.network != 'local' }}
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Start local replica (local only)
        if: ${{ inputs.network == 'local' }}
        run: |
          dfx start --background --clean --host 127.0.0.1:4943
          sleep 3
          dfx ping

      - name: Run stage 0
        id: stage0
        run: |
          python3 scripts/ci_install_mundus.py \
              --file ${{ inputs.descriptor }} \
              --stages 0 \
              --infra-ids-out infra-ids.json

      # realm_installer is pinned in the staging descriptor (so stage 0
      # skips it), but we must upgrade it on every push so it has the
      # latest endpoints (e.g. deploy_realm from #192).  Build with
      # basilisk and install via dfx canister install --mode upgrade.
      - name: Upgrade realm_installer (non-local)
        if: ${{ inputs.network != 'local' }}
        run: |
          INSTALLER_ID=$(python3 -c "import json; print(json.load(open('infra-ids.json')).get('realm_installer',''))")
          if [ -z "$INSTALLER_ID" ]; then
            echo "::warning::realm_installer not in infra-ids.json — skipping upgrade"
            exit 0
          fi
          echo "Building realm_installer wasm…"
          CANISTER_CANDID_PATH=src/realm_installer/realm_installer.did \
            python3 -m basilisk realm_installer src/realm_installer/main.py
          echo "Upgrading $INSTALLER_ID on ${{ inputs.network }}…"
          dfx canister install "$INSTALLER_ID" \
              --wasm .basilisk/realm_installer/realm_installer.wasm \
              --mode upgrade --yes \
              --network ${{ inputs.network }}
          echo "✅ realm_installer upgraded"

      - name: Emit infra-ids JSON output
        id: write
        run: |
          echo "json=$(jq -c '.' infra-ids.json)" >> "$GITHUB_OUTPUT"
          jq '.' infra-ids.json

      - uses: actions/upload-artifact@v4
        with:
          name: infra-ids-${{ inputs.network }}
          path: infra-ids.json
          retention-days: 1
