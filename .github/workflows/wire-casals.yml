# wire-casals.yml — wire an environment's infra canisters to a Casals instance
# using the privileged CI identity (IC_IDENTITY_PEM).
#
# This is the "Option A" path for environments whose infra canisters
# (installer / registry / file_registry / frontends) are controlled by the CI
# identity rather than by the operator running the local migration. It performs
# only the controller + config wiring that requires that identity:
#
#   1. Adds the Casals canister (and any extra principals, e.g. a conductor
#      Internet Identity) as a CONTROLLER of each selected infra canister, so
#      Casals can manage/upgrade them.
#   2. Optionally calls `set_casals_config` on the realm_installer to point it at
#      the Casals instance (flag left OFF unless `enable_provision` is checked).
#
# It does NOT register canisters into the Casals tree or fund/deploy Casals —
# those are done by the operator who controls the Casals instance.
#
# Manually triggered. Dry-run by default (leave `execute` unchecked to preview).

name: Wire Casals (infra controllers + installer config)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - test
          - demo
          - staging
      casals_id:
        description: "Casals canister ID for this environment"
        required: true
      extra_controllers:
        description: "Extra controller principals to add (comma-separated, optional, e.g. a conductor Internet Identity)"
        required: false
        default: ""
      canisters:
        description: "Which infra canisters to wire"
        required: true
        type: choice
        default: all
        options:
          - all
          - realm_installer
          - realm_registry_backend
          - realm_registry_frontend
          - file_registry
          - file_registry_frontend
      set_installer_config:
        description: "Also set_casals_config on the installer (points it at Casals)"
        required: false
        type: boolean
        default: true
      enable_provision:
        description: "Turn the installer's provision_via_casals flag ON (default OFF for safe coexistence)"
        required: false
        type: boolean
        default: false
      execute:
        description: "Apply changes (unchecked = dry-run plan only)"
        required: false
        type: boolean
        default: false

concurrency:
  group: wire-casals-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  wire-casals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"
          echo "CI identity principal: $(dfx identity get-principal)"

      - name: Resolve infra canister IDs
        id: ids
        run: |
          python3 - <<'PY'
          import json, os
          env = "${{ inputs.environment }}"
          which = "${{ inputs.canisters }}"
          ids = json.load(open("canister_ids.json"))
          names = [
              "realm_installer",
              "realm_registry_backend",
              "realm_registry_frontend",
              "file_registry",
              "file_registry_frontend",
          ]
          selected = names if which == "all" else [which]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              for n in names:
                  cid = ids.get(n, {}).get(env, "")
                  f.write(f"{n}={cid if n in selected else ''}\n")
                  if n in selected and not cid:
                      print(f"::warning::No canister ID for {n} on {env}")
          PY

      - name: Add Casals (and extra controllers) to infra canisters
        run: |
          set -euo pipefail
          CASALS="${{ inputs.casals_id }}"
          EXECUTE="${{ inputs.execute }}"
          EXTRA="${{ inputs.extra_controllers }}"
          ADD_ARGS="--add-controller $CASALS"
          if [ -n "$EXTRA" ]; then
            IFS=',' read -ra PARTS <<< "$EXTRA"
            for p in "${PARTS[@]}"; do
              p="$(echo "$p" | xargs)"
              [ -n "$p" ] && ADD_ARGS="$ADD_ARGS --add-controller $p"
            done
          fi
          for cid in \
            "${{ steps.ids.outputs.realm_installer }}" \
            "${{ steps.ids.outputs.realm_registry_backend }}" \
            "${{ steps.ids.outputs.realm_registry_frontend }}" \
            "${{ steps.ids.outputs.file_registry }}" \
            "${{ steps.ids.outputs.file_registry_frontend }}"; do
            [ -z "$cid" ] && continue
            echo "── $cid : add controllers [$CASALS $EXTRA]"
            if [ "$EXECUTE" = "true" ]; then
              dfx canister update-settings "$cid" $ADD_ARGS --network ic
              echo "   controllers now: $(dfx canister info "$cid" --network ic | grep -i controllers)"
            else
              echo "   [dry-run] dfx canister update-settings $cid $ADD_ARGS --network ic"
            fi
          done

      - name: set_casals_config on installer
        if: ${{ inputs.set_installer_config == true }}
        run: |
          set -euo pipefail
          INSTALLER="${{ steps.ids.outputs.realm_installer }}"
          REGISTRY="${{ steps.ids.outputs.realm_registry_backend }}"
          CASALS="${{ inputs.casals_id }}"
          EXECUTE="${{ inputs.execute }}"
          PROVISION="${{ inputs.enable_provision }}"
          if [ -z "$INSTALLER" ]; then
            echo "::warning::installer not selected/resolved; skipping set_casals_config"
            exit 0
          fi
          ARG="(\"{\\\"provision_via_casals\\\":$PROVISION,\\\"casals_canister_id\\\":\\\"$CASALS\\\",\\\"casals_section\\\":\\\"Deployments\\\",\\\"registry_principal\\\":\\\"$REGISTRY\\\"}\")"
          echo "set_casals_config -> installer=$INSTALLER casals=$CASALS provision=$PROVISION registry=$REGISTRY"
          if [ "$EXECUTE" = "true" ]; then
            dfx canister call "$INSTALLER" set_casals_config "$ARG" --network ic
            echo "── verify:"
            dfx canister call "$INSTALLER" get_casals_config '()' --network ic
          else
            echo "   [dry-run] dfx canister call $INSTALLER set_casals_config $ARG --network ic"
          fi

      - name: Summary
        run: |
          echo "═══════════════════════════════════════"
          echo " Wire Casals complete"
          echo " Environment: ${{ inputs.environment }}"
          echo " Casals:      ${{ inputs.casals_id }}"
          echo " Canisters:   ${{ inputs.canisters }}"
          echo " Execute:     ${{ inputs.execute }}"
          echo " Provision:   ${{ inputs.enable_provision }}"
          echo "═══════════════════════════════════════"
