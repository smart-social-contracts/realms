# Manual full IC deploy for staging, demo, or test (empty canisters → installed WASM).
# Same path as CI staging deploy: deploy_direct.py on *-mundus-layered.yml.
#
# Requires repo secret: IC_IDENTITY_PEM (controller on the target canisters).

name: Deploy IC environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "IC environment (descriptor deployments/<env>-mundus-layered.yml)"
        type: choice
        required: true
        default: test
        options:
          - test
          - demo
          - staging

concurrency:
  group: deploy-ic-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-ic-mundus.yml
    with:
      mundus_descriptor: deployments/${{ inputs.environment }}-mundus-layered.yml
      artifact_network: ${{ inputs.environment }}
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
