# upgrade-infra-canisters.yml — upgrade infrastructure canisters only.
#
# Builds and upgrades realm_installer and/or realm_registry_backend
# on staging/demo without running the full mundus deploy pipeline.
# Use this when you've changed installer or registry code and want
# to deploy just those canisters quickly (~2-5 minutes).

name: Upgrade Infra Canisters

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        default: staging
        options:
          - staging
          - demo

      canisters:
        description: "Which canisters to upgrade"
        required: true
        type: choice
        default: both
        options:
          - both
          - realm_installer
          - realm_registry_backend

      ref:
        description: "Branch/commit to build from (defaults to main)"
        required: false
        default: ""

concurrency:
  group: upgrade-infra-${{ inputs.network }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  DFX_VERSION: "0.31.0"

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Parameters
        run: |
          echo "Network:   ${{ inputs.network }}"
          echo "Canisters: ${{ inputs.canisters }}"
          echo "Ref:       ${{ inputs.ref || 'main' }}"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx ${{ env.DFX_VERSION }}
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyyaml

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      # ── Upgrade realm_installer ──────────────────────────────────────
      - name: Build & upgrade realm_installer
        if: ${{ inputs.canisters == 'both' || inputs.canisters == 'realm_installer' }}
        run: |
          NETWORK="${{ inputs.network }}"
          # Resolve canister ID from descriptor
          INSTALLER_ID=$(python3 -c "
          import yaml
          desc = yaml.safe_load(open('deployments/${NETWORK}-mundus-layered.yml'))
          print(desc.get('infrastructure_overrides', {}).get('realm_installer', {}).get('canister_id', ''))
          ")
          if [ -z "$INSTALLER_ID" ]; then
            echo "::error::realm_installer canister_id not found in descriptor"
            exit 1
          fi
          echo "Building realm_installer WASM..."
          CANISTER_CANDID_PATH=src/realm_installer/realm_installer.did \
            python3 -m basilisk realm_installer src/realm_installer/main.py

          echo "Upgrading realm_installer ($INSTALLER_ID) on $NETWORK..."
          dfx canister install "$INSTALLER_ID" \
              --wasm .basilisk/realm_installer/realm_installer.wasm \
              --mode upgrade --yes \
              --network "$NETWORK"

          echo "Verifying..."
          dfx canister call "$INSTALLER_ID" health '()' --network "$NETWORK"
          echo "✅ realm_installer upgraded on $NETWORK"

      # ── Upgrade realm_registry_backend ───────────────────────────────
      - name: Build & upgrade realm_registry_backend
        if: ${{ inputs.canisters == 'both' || inputs.canisters == 'realm_registry_backend' }}
        run: |
          NETWORK="${{ inputs.network }}"
          # Resolve canister ID from descriptor
          REGISTRY_ID=$(python3 -c "
          import yaml
          desc = yaml.safe_load(open('deployments/${NETWORK}-mundus-layered.yml'))
          for m in desc.get('mundus', []):
              if m.get('name') == 'realm_registry_backend':
                  print(m.get('canister_id', ''))
                  break
          ")
          if [ -z "$REGISTRY_ID" ]; then
            echo "::error::realm_registry_backend canister_id not found in descriptor"
            exit 1
          fi
          echo "Building realm_registry_backend WASM..."
          CANISTER_CANDID_PATH=src/realm_registry_backend/realm_registry_backend.did \
            python3 -m basilisk realm_registry_backend src/realm_registry_backend/main.py

          echo "Upgrading realm_registry_backend ($REGISTRY_ID) on $NETWORK..."
          dfx canister install "$REGISTRY_ID" \
              --wasm .basilisk/realm_registry_backend/realm_registry_backend.wasm \
              --mode upgrade --yes \
              --network "$NETWORK"

          echo "Verifying..."
          dfx canister call "$REGISTRY_ID" status '()' --network "$NETWORK"
          echo "✅ realm_registry_backend upgraded on $NETWORK"

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo " Infra canister upgrade complete"
          echo " Network: ${{ inputs.network }}"
          echo " Canisters: ${{ inputs.canisters }}"
          echo "═══════════════════════════════════════"
