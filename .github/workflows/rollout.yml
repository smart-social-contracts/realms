# rollout.yml — upgrade/reinstall realm + infra canisters across environments
# via Casals (manually triggered).
#
# Publish artifacts first with publish-build.yml — a semver release (-f version=X.Y.Z)
# or a main-branch snapshot (-f from_main=true).

name: Rollout

on:
  workflow_dispatch:
    inputs:
      environments:
        description: "Environments (comma-separated, or 'all')"
        required: true
        default: test
      targets:
        description: "Targets: stand names, or all-realms / all-infra / all"
        required: true
        default: all-realms
      scope:
        description: "Which canisters"
        required: true
        type: choice
        default: both
        options:
          - both
          - backend
          - frontend
      mode:
        description: "upgrade (keeps state) or reinstall (wipes state on success)"
        required: true
        type: choice
        default: upgrade
        options:
          - upgrade
          - reinstall
      version:
        description: "Artifact version: 'main' (latest main snapshot), 'latest' (semver), or e.g. 0.4.0"
        required: false
        default: latest
      include_infra_reinstall:
        description: "Allow reinstalling state-wiping infra (file-registry, realm-registry)"
        required: false
        type: boolean
        default: false

concurrency:
  group: rollout-${{ inputs.environments }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"

jobs:
  rollout:
    runs-on: ubuntu-latest
    # A full multi-canister reinstall re-uploads every frontend bundle (~20 min
    # per 100+ file certified-assets bundle) and then applies the environment
    # arrangement, so a whole-sheet reinstall easily exceeds the old 30 min cap.
    timeout-minutes: 180
    steps:
      - name: Input parameters
        run: |
          echo "Environments:              ${{ inputs.environments }}"
          echo "Targets:                   ${{ inputs.targets }}"
          echo "Scope:                     ${{ inputs.scope }}"
          echo "Mode:                      ${{ inputs.mode }}"
          echo "Version:                   ${{ inputs.version || 'latest' }}"
          echo "Include infra reinstall:   ${{ inputs.include_infra_reinstall }}"
          echo "Ref:                       ${{ github.ref }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity (Casals CI key)
        env:
          # rollout.yml only talks to Casals, so it uses the dedicated Casals CI
          # key (a controller of the Casals canisters). Falls back to
          # IC_IDENTITY_PEM for backward compatibility if CASALS_CI_PEM is unset.
          CASALS_CI_PEM: ${{ secrets.CASALS_CI_PEM }}
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          PEM="${CASALS_CI_PEM:-$IC_IDENTITY_PEM}"
          if [ -z "$PEM" ]; then
            echo "::error::Neither CASALS_CI_PEM nor IC_IDENTITY_PEM is set." >&2
            exit 1
          fi
          printf '%s' "$PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"
          echo "rollout identity principal: $(dfx identity get-principal)"

      - name: Rollout
        run: |
          realms rollout \
            --environments "${{ inputs.environments }}" \
            --targets "${{ inputs.targets }}" \
            --scope "${{ inputs.scope }}" \
            --mode "${{ inputs.mode }}" \
            --version "${{ inputs.version || 'latest' }}" \
            --identity ci \
            --execute \
            --yes \
            ${{ inputs.include_infra_reinstall && '--include-infra-reinstall' || '' }}
