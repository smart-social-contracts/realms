# rollout.yml — upgrade/reinstall realm + infra canisters across environments
# via Casals (manually triggered).
#
# Dry-run by default: leave `execute` unchecked to only print the plan.
# Publish artifacts first with publish-build.yml (semver) or publish-main.yml (main branch).

name: Rollout

on:
  workflow_dispatch:
    inputs:
      environments:
        description: "Environments (comma-separated, or 'all')"
        required: true
        default: test
      targets:
        description: "Targets: stand names, or all-realms / all-infra / all"
        required: true
        default: all-realms
      scope:
        description: "Which canisters"
        required: true
        type: choice
        default: both
        options:
          - both
          - backend
          - frontend
      mode:
        description: "upgrade (keeps state) or reinstall (wipes state on success)"
        required: true
        type: choice
        default: upgrade
        options:
          - upgrade
          - reinstall
      version:
        description: "Artifact version: 'main' (latest main snapshot), 'latest' (semver), or e.g. 0.4.0"
        required: false
        default: latest
      execute:
        description: "Apply changes (unchecked = dry-run plan only)"
        required: false
        type: boolean
        default: false
      include_infra_reinstall:
        description: "Allow reinstalling state-wiping infra (file-registry, realm-registry)"
        required: false
        type: boolean
        default: false

concurrency:
  group: rollout-${{ inputs.environments }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"

jobs:
  rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Rollout
        run: |
          realms rollout \
            --environments "${{ inputs.environments }}" \
            --targets "${{ inputs.targets }}" \
            --scope "${{ inputs.scope }}" \
            --mode "${{ inputs.mode }}" \
            --version "${{ inputs.version || 'latest' }}" \
            --identity ci \
            --yes \
            ${{ inputs.execute && '--execute' || '' }} \
            ${{ inputs.include_infra_reinstall && '--include-infra-reinstall' || '' }}
