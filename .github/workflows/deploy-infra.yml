name: Deploy Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - test
          - demo
          - staging

      deploy_mode:
        description: "WASM deploy mode"
        required: true
        type: choice
        default: upgrade
        options:
          - upgrade
          - reinstall
          - install

      canisters:
        description: "Which infra canisters to deploy"
        required: true
        type: choice
        default: all
        options:
          - all
          - realm_registry_backend
          - realm_registry_frontend
          - realm_installer
          - file_registry
          - file_registry_frontend
          - marketplace_backend
          - marketplace_frontend
          - platform_dashboard_frontend

      ref:
        description: "Branch/commit to build from (defaults to main)"
        required: false
        default: ""

concurrency:
  group: deploy-infra-${{ inputs.environment }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Parameters
        run: |
          echo "Environment:  ${{ inputs.environment }}"
          echo "Deploy mode:  ${{ inputs.deploy_mode }}"
          echo "Canisters:    ${{ inputs.canisters }}"
          echo "Ref:          ${{ inputs.ref || github.ref }}"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install npm workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Python deps
        run: |
          pip install -r requirements.txt

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Resolve canister IDs
        id: ids
        run: |
          python3 - <<'PY'
          import json, os
          env = "${{ inputs.environment }}"
          ids = json.load(open("canister_ids.json"))
          def emit(key, canister):
              cid = ids.get(canister, {}).get(env, "")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write(f"{key}={cid}\n")
              if not cid:
                  print(f"::warning::No canister ID for {canister} on {env}")
          emit("realm_registry_backend", "realm_registry_backend")
          emit("realm_registry_frontend", "realm_registry_frontend")
          emit("realm_installer", "realm_installer")
          emit("file_registry", "file_registry")
          emit("file_registry_frontend", "file_registry_frontend")
          emit("marketplace_backend", "marketplace_backend")
          emit("marketplace_frontend", "marketplace_frontend")
          emit("platform_dashboard_frontend", "platform_dashboard_frontend")
          PY

      # ── Backend canisters (basilisk WASM) ─────────────────────────────

      - name: Build & deploy realm_registry_backend
        if: inputs.canisters == 'all' || inputs.canisters == 'realm_registry_backend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.realm_registry_backend }}"
          MODE="${{ inputs.deploy_mode }}"
          CANISTER_CANDID_PATH=src/realm_registry_backend/realm_registry_backend.did \
            python3 -m basilisk realm_registry_backend src/realm_registry_backend/main.py
          dfx canister install "$CID" \
              --wasm .basilisk/realm_registry_backend/realm_registry_backend.wasm \
              --mode "$MODE" --yes --network "$NETWORK"
          dfx canister call "$CID" status '()' --network "$NETWORK"
          echo "✅ realm_registry_backend deployed"

      - name: Build & deploy realm_installer
        if: inputs.canisters == 'all' || inputs.canisters == 'realm_installer'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.realm_installer }}"
          MODE="${{ inputs.deploy_mode }}"
          CANISTER_CANDID_PATH=src/realm_installer/realm_installer.did \
            python3 -m basilisk realm_installer src/realm_installer/main.py
          dfx canister install "$CID" \
              --wasm .basilisk/realm_installer/realm_installer.wasm \
              --mode "$MODE" --yes --network "$NETWORK"
          dfx canister call "$CID" health '()' --network "$NETWORK"
          echo "✅ realm_installer deployed"

      - name: Build & deploy file_registry
        if: inputs.canisters == 'all' || inputs.canisters == 'file_registry'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.file_registry }}"
          MODE="${{ inputs.deploy_mode }}"
          CANISTER_CANDID_PATH=src/file_registry/file_registry.did \
            python3 -m basilisk file_registry src/file_registry/main.py
          dfx canister install "$CID" \
              --wasm .basilisk/file_registry/file_registry.wasm \
              --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ file_registry deployed"

      - name: Build & deploy marketplace_backend
        if: inputs.canisters == 'all' || inputs.canisters == 'marketplace_backend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.marketplace_backend }}"
          MODE="${{ inputs.deploy_mode }}"
          CANISTER_CANDID_PATH=src/marketplace_backend/marketplace_backend.did \
            python3 -m basilisk marketplace_backend src/marketplace_backend/main.py
          dfx canister install "$CID" \
              --wasm .basilisk/marketplace_backend/marketplace_backend.wasm \
              --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ marketplace_backend deployed"

      # ── Frontend canisters (asset canisters) ──────────────────────────

      - name: Generate Candid declarations for frontends
        if: inputs.canisters == 'all' || contains(fromJSON('["realm_registry_frontend","file_registry_frontend","marketplace_frontend","platform_dashboard_frontend"]'), inputs.canisters)
        run: |
          for canister in realm_registry_backend realm_installer marketplace_backend file_registry realm_backend; do
            dfx generate "$canister" 2>/dev/null || true
          done

      - name: Build & deploy realm_registry_frontend
        if: inputs.canisters == 'all' || inputs.canisters == 'realm_registry_frontend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.realm_registry_frontend }}"
          MODE="${{ inputs.deploy_mode }}"
          npm run build --workspace=realm_registry_frontend
          if [ "$MODE" = "reinstall" ]; then
            dfx canister uninstall-code "$CID" --network "$NETWORK"
            MODE="install"
          fi
          dfx deploy realm_registry_frontend --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ realm_registry_frontend deployed"

      - name: Build & deploy file_registry_frontend
        if: inputs.canisters == 'all' || inputs.canisters == 'file_registry_frontend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.file_registry_frontend }}"
          MODE="${{ inputs.deploy_mode }}"
          npm run build --workspace=file_registry_frontend
          if [ "$MODE" = "reinstall" ]; then
            dfx canister uninstall-code "$CID" --network "$NETWORK"
            MODE="install"
          fi
          dfx deploy file_registry_frontend --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ file_registry_frontend deployed"

      - name: Build & deploy marketplace_frontend
        if: inputs.canisters == 'all' || inputs.canisters == 'marketplace_frontend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.marketplace_frontend }}"
          MODE="${{ inputs.deploy_mode }}"
          npm run build --workspace=marketplace_frontend
          if [ "$MODE" = "reinstall" ]; then
            dfx canister uninstall-code "$CID" --network "$NETWORK"
            MODE="install"
          fi
          dfx deploy marketplace_frontend --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ marketplace_frontend deployed"

      - name: Build & deploy platform_dashboard_frontend
        if: inputs.canisters == 'all' || inputs.canisters == 'platform_dashboard_frontend'
        run: |
          NETWORK="${{ inputs.environment }}"
          CID="${{ steps.ids.outputs.platform_dashboard_frontend }}"
          MODE="${{ inputs.deploy_mode }}"
          npm run build --workspace=platform_dashboard_frontend
          if [ "$MODE" = "reinstall" ]; then
            dfx canister uninstall-code "$CID" --network "$NETWORK"
            MODE="install"
          fi
          dfx deploy platform_dashboard_frontend --mode "$MODE" --yes --network "$NETWORK"
          echo "✅ platform_dashboard_frontend deployed"

      # ── Smoke tests ───────────────────────────────────────────────────

      - name: Smoke test backends
        run: |
          NETWORK="${{ inputs.environment }}"
          CANISTERS="${{ inputs.canisters }}"
          fail=0
          for pair in \
            "realm_registry_backend:${{ steps.ids.outputs.realm_registry_backend }}:status" \
            "realm_installer:${{ steps.ids.outputs.realm_installer }}:health" \
            "file_registry:${{ steps.ids.outputs.file_registry }}:status" \
            "marketplace_backend:${{ steps.ids.outputs.marketplace_backend }}:status"; do
            name="${pair%%:*}"; rest="${pair#*:}"; cid="${rest%%:*}"; method="${rest#*:}"
            if [ "$CANISTERS" = "all" ] || [ "$CANISTERS" = "$name" ]; then
              echo "Checking $name ($cid)..."
              if dfx canister call "$cid" "$method" '()' --network "$NETWORK"; then
                echo "  ✅ $name OK"
              else
                echo "  ❌ $name FAILED"
                fail=1
              fi
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Smoke test frontends
        run: |
          CANISTERS="${{ inputs.canisters }}"
          fail=0
          for pair in \
            "realm_registry_frontend:${{ steps.ids.outputs.realm_registry_frontend }}" \
            "file_registry_frontend:${{ steps.ids.outputs.file_registry_frontend }}" \
            "marketplace_frontend:${{ steps.ids.outputs.marketplace_frontend }}" \
            "platform_dashboard_frontend:${{ steps.ids.outputs.platform_dashboard_frontend }}"; do
            name="${pair%%:*}"; cid="${pair#*:}"
            if [ "$CANISTERS" = "all" ] || [ "$CANISTERS" = "$name" ]; then
              echo "Checking $name ($cid)..."
              if curl -sf "https://${cid}.icp0.io/" -o /dev/null; then
                echo "  ✅ $name OK"
              else
                echo "  ❌ $name FAILED"
                fail=1
              fi
            fi
          done
          [ $fail -eq 0 ] || exit 1

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo " Infra deploy complete"
          echo " Environment: ${{ inputs.environment }}"
          echo " Canisters:   ${{ inputs.canisters }}"
          echo " Mode:        ${{ inputs.deploy_mode }}"
          echo "═══════════════════════════════════════"
