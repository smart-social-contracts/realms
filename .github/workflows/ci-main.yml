# ci-main.yml — main pipeline.
#
# E2E tests and staging deploy run in parallel.

name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ── E2E tests on a local replica ────────────────────────────────────────────
  layered-e2e-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"
      - name: Install realms CLI + Python deps
        run: |
          pip install -r requirements.txt
          pip install -e cli/
          pip install pyyaml
      - name: Start local replica
        run: |
          dfx start --background --clean --host 127.0.0.1:4943
          sleep 3
      - name: Run all four stages on the local mundus
        run: |
          python3 scripts/ci_install_mundus.py \
              --file deployments/local-mundus.yml \
              --stages 0,1,2,3
      - name: Stop local replica
        if: always()
        run: dfx stop || true

  # ── Staging deploy (runs in parallel with e2e) ──────────────────────────────
  deploy-staging:
    uses: ./.github/workflows/_deploy-staging.yml
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
