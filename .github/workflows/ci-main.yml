# ci-main.yml — main pipeline.
#
# E2E tests and staging deploy run in parallel.

name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-main
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  # ── E2E tests on a local replica ────────────────────────────────────────────
  layered-e2e-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install IC CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/dfinity/icp-cli/releases/latest/download/icp-cli-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          if command -v icp &>/dev/null && ! command -v dfx &>/dev/null; then
            ln -sf "$(which icp)" "$HOME/.cargo/bin/dfx" 2>/dev/null || true
          fi
      - name: Install realms CLI + Python deps
        run: |
          pip install -r requirements.txt
          pip install -e cli/
          pip install pyyaml
      - name: Start local replica
        run: |
          dfx start --background --clean --host 127.0.0.1:4943
          sleep 3
      - name: Run all four stages on the local mundus
        run: |
          python3 scripts/ci_install_mundus.py \
              --file deployments/local-mundus.yml \
              --stages 0,1,2,3
      - name: Stop local replica
        if: always()
        run: dfx stop || true

  # ── Staging deploy (runs in parallel with e2e) ──────────────────────────────
  deploy-staging:
    uses: ./.github/workflows/deploy-mundus.yml
    with:
      descriptor: deployments/staging-mundus-layered.yml
      artifact_network: staging
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
