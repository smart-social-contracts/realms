# ci-main.yml — main pipeline.
#
# Two phases:
#   Phase A — local gating: run all four pipeline stages against an
#             ephemeral local replica inside ONE runner (the local
#             replica state can't survive a job boundary).
#   Phase B — staging deploy: re-run stages against the real staging
#             subnet using the four reusable workflows (canisters are
#             long-lived there so per-stage jobs are fine and give
#             better observability).
#
# To push to mainnet (`ic`), use the manual workflow
# `layered-deploy-dominion.yml`.

name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Serialize main pushes — never two staging deploys racing.
  group: ci-main
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"
  DFX_VERSION: "0.31.0"

jobs:
  # ── Phase A: local gating ──────────────────────────────────────────────────
  layered-e2e-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dfx ${{ env.DFX_VERSION }}
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"
      - name: Install realms CLI + Python deps
        run: |
          pip install -e cli/
          pip install pyyaml
      - name: Start local replica
        run: |
          dfx start --background --clean --host 127.0.0.1:4943
          sleep 3
      - name: Run all four stages on the local mundus
        run: |
          python3 scripts/ci_install_mundus.py \
              --file deployments/local-mundus.yml \
              --stages 0,1,2,3
      - name: Stop local replica
        if: always()
        run: dfx stop || true

  # ── Phase B: staging deploy (gated on Phase A) ─────────────────────────────
  bootstrap-infra-staging:
    needs: layered-e2e-local
    uses: ./.github/workflows/_bootstrap-infra.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}

  publish-artifacts-staging:
    needs: bootstrap-infra-staging
    uses: ./.github/workflows/_publish-artifacts.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
      infra-ids: ${{ needs.bootstrap-infra-staging.outputs.infra-ids }}
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}

  install-mundus-staging:
    needs: [bootstrap-infra-staging, publish-artifacts-staging]
    uses: ./.github/workflows/_install-mundus.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
      infra-ids: ${{ needs.bootstrap-infra-staging.outputs.infra-ids }}
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}

  verify-mundus-staging:
    needs: install-mundus-staging
    uses: ./.github/workflows/_verify-mundus.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml

  deploy-dashboard-staging:
    needs: layered-e2e-local
    uses: ./.github/workflows/_deploy-dashboard.yml
    with:
      network: staging
    secrets:
      IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
