# ci-main.yml — main pipeline.
#
# Same code path as ci-pr.yml, but two phases:
#   Phase A — local gating (everything PR CI does), against a fresh replica
#             inside the runner, to avoid promoting broken code to staging.
#   Phase B — staging deploy: re-run stages 1+2+3 against the real staging
#             subnet, reusing the long-lived file_registry / realm_installer
#             that already live there.
#
# If you want to push to mainnet (`ic`), use the manual workflow
# `layered-deploy-dominion.yml` (which composes the same reusable
# building blocks).

name: CI (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Serialize main pushes — never have two staging deploys racing.
  group: ci-main
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

# ── Phase A: local gating (fast feedback, no IC cycles spent) ────────────────
jobs:
  bootstrap-infra-local:
    uses: ./.github/workflows/_bootstrap-infra.yml
    with:
      network: local
      descriptor: deployments/local-mundus.yml

  publish-artifacts-local:
    needs: bootstrap-infra-local
    uses: ./.github/workflows/_publish-artifacts.yml
    with:
      network: local
      descriptor: deployments/local-mundus.yml
      infra-ids: ${{ needs.bootstrap-infra-local.outputs.infra-ids }}

  install-mundus-local:
    needs: publish-artifacts-local
    uses: ./.github/workflows/_install-mundus.yml
    with:
      network: local
      descriptor: deployments/local-mundus.yml
      infra-ids: ${{ needs.bootstrap-infra-local.outputs.infra-ids }}

  verify-mundus-local:
    needs: install-mundus-local
    uses: ./.github/workflows/_verify-mundus.yml
    with:
      network: local
      descriptor: deployments/local-mundus.yml

  # ── Phase B: staging deploy (gated on Phase A) ─────────────────────────────
  bootstrap-infra-staging:
    needs: verify-mundus-local
    uses: ./.github/workflows/_bootstrap-infra.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
    secrets:
      DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}

  publish-artifacts-staging:
    needs: bootstrap-infra-staging
    uses: ./.github/workflows/_publish-artifacts.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
      infra-ids: ${{ needs.bootstrap-infra-staging.outputs.infra-ids }}
    secrets:
      DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}

  install-mundus-staging:
    needs: publish-artifacts-staging
    uses: ./.github/workflows/_install-mundus.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
      infra-ids: ${{ needs.bootstrap-infra-staging.outputs.infra-ids }}
    secrets:
      DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}

  verify-mundus-staging:
    needs: install-mundus-staging
    uses: ./.github/workflows/_verify-mundus.yml
    with:
      network: staging
      descriptor: deployments/staging-mundus-layered.yml
