# _verify-mundus.yml — reusable workflow.
#
# Stage 4 of the layered CI pipeline: runs the integration tests and
# Playwright e2e specs declared in the descriptor's `verify` block
# against the now-installed mundus.
#
# Sharded so a slow test group doesn't block the rest.

name: _verify-mundus

on:
  workflow_call:
    inputs:
      network:
        required: true
        type: string
      descriptor:
        required: true
        type: string

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  parse-descriptor:
    runs-on: ubuntu-latest
    outputs:
      e2e-specs: ${{ steps.read.outputs.e2e }}
      integration-tests: ${{ steps.read.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pyyaml
      - id: read
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import yaml, json, os
          d = yaml.safe_load(open(os.environ["DESC"]))
          v = d.get("verify") or {}
          print("e2e=" + json.dumps(v.get("e2e_specs") or []))
          print("integration=" + json.dumps(v.get("integration_tests") or []))
          PY
        env:
          DESC: ${{ inputs.descriptor }}

  e2e:
    needs: parse-descriptor
    if: ${{ needs.parse-descriptor.outputs.e2e-specs != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJSON(needs.parse-descriptor.outputs.e2e-specs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Playwright + project deps
        working-directory: src/realm_frontend
        run: |
          # --legacy-peer-deps: svelte-markdown@0.4.1 declares a peer
          # range that doesn't intersect the svelte version we pin.
          npm ci --legacy-peer-deps
          npx playwright install --with-deps chromium
      - name: Run spec ${{ matrix.spec }}
        working-directory: src/realm_frontend
        env:
          PLAYWRIGHT_NETWORK: ${{ inputs.network }}
        run: npx playwright test ${{ matrix.spec }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-${{ strategy.job-index }}
          path: src/realm_frontend/playwright-report
          retention-days: 7

  integration:
    needs: parse-descriptor
    if: ${{ needs.parse-descriptor.outputs.integration-tests != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.parse-descriptor.outputs.integration-tests) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          pip install -e cli/
          pip install -r requirements.txt
          pip install pytest
      - name: Run ${{ matrix.test }}
        run: pytest -v ${{ matrix.test }}
