# fast-deploy.yml — manual, fast deploy for prototyping.
#
# Uses the queue-based deployment architecture via
# realm_registry_backend.request_deployment and installer polling.
#
# Trade-offs vs ci-main.yml:
#   * Skips Phase A (no local-replica e2e gating).
#   * No Playwright / integration tests at the end.
#   * Optional `realms` / `extensions` filters trim what gets built and
#     deployed, so a frontend-only iteration on a single realm becomes
#     ~3-5 minutes.
#
# Cost: ~$0.50 per full deploy (vs ~$47 with the old file_registry path).
#
# Use the regular `CI (main)` pipeline for anything that should be gated
# by tests before reaching staging/demo/test. This workflow is a developer
# tool — not a release pipeline. For a full-stack first install to empty
# canisters, prefer workflow "Deploy IC environment" (test/demo/staging).

name: Deploy

on:
  workflow_dispatch:
    inputs:
      descriptor:
        description: "Mundus descriptor to deploy"
        required: true
        type: choice
        default: deployments/staging-mundus-layered.yml
        options:
          - deployments/staging-mundus-layered.yml
          - deployments/demo-mundus-layered.yml
          - deployments/test-mundus-layered.yml

      realms:
        description: "Comma-separated mundus member names to (re)deploy. Leave empty for all (e.g. 'dominion' or 'dominion,agora')."
        required: false
        default: ""

      extensions:
        description: "Comma-separated extension ids to publish + install. Leave empty for all (e.g. 'package_manager,admin_dashboard')."
        required: false
        default: ""

      install_mode:
        description: "Install mode for realm canisters"
        required: false
        type: choice
        default: upgrade
        options:
          - upgrade
          - reinstall
          - install

      skip_base_wasm:
        description: "Skip compiling and deploying the Rust backend WASM."
        required: false
        type: boolean
        default: false

      ref:
        description: "realms commit/branch to deploy from (defaults to the workflow ref)."
        required: false
        default: ""

concurrency:
  # Different group from `ci-main` so this can run in parallel with the
  # main pipeline. Self-serializing per-descriptor so two parallel fast-
  # deploys against the same descriptor don't race.
  group: fast-deploy-${{ inputs.descriptor }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  fast-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Deploy parameters
        run: |
          echo "╭────────────────────────────────────────╮"
          echo "│ ⚡ Deploy                               │"
          echo "╰────────────────────────────────────────╯"
          echo "📄 Descriptor:    ${{ inputs.descriptor }}"
          echo "🏛️  Realms:        ${{ inputs.realms || '(all)' }}"
          echo "🧩 Extensions:    ${{ inputs.extensions || '(all from descriptor)' }}"
          echo "🔧 Install mode:  ${{ inputs.install_mode }}"
          echo "⏭  Skip base WASM: ${{ inputs.skip_base_wasm }}"
          echo "🔀 Ref:           ${{ inputs.ref || github.ref }}"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install npm workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install realms CLI + Python deps
        run: |
          pip install -r requirements.txt
          pip install -e cli/
          pip install pyyaml

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set on this repo." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Submit queue deployment for ${{ inputs.descriptor }}
        env:
          DESCRIPTOR: ${{ inputs.descriptor }}
        run: |
          echo "→ python3 scripts/request_deployment.py --file \"$DESCRIPTOR\""
          python3 scripts/request_deployment.py --file "$DESCRIPTOR"

      - name: Upload build artifacts to deploy service cache
        if: always()
        run: |
          pip install requests
          if echo "${{ inputs.descriptor }}" | grep -qE "demo-mundus|/demo-"; then NETWORK=demo
          elif echo "${{ inputs.descriptor }}" | grep -qE "test-mundus|/test-"; then NETWORK=test
          else NETWORK=staging
          fi
          python3 scripts/upload_ci_artifacts.py --network "$NETWORK"
        continue-on-error: true

      - name: Print frontend URLs
        if: success()
        run: |
          python3 - <<'PY'
          import os, yaml
          desc = yaml.safe_load(open(os.environ["DESC"]))
          print()
          print("✅ Fast deploy complete. Live frontends:")
          for m in desc.get("mundus", []):
              fe = m.get("frontend_canister_id")
              cid = m.get("canister_id")
              name = m.get("display_name") or m["name"]
              if fe:
                  print(f"   • {name:30s} → https://{fe}.icp0.io/")
              elif cid and m.get("type", "") in ("dashboard",):
                  print(f"   • {name:30s} → https://{cid}.icp0.io/")
          PY
        env:
          DESC: ${{ inputs.descriptor }}
