# test-deploy-new-realm.yml — end-to-end test for new realm creation.
#
# Submits a deployment request with no canister IDs, so the installer
# creates new canisters via CycleOps. The deployer picks up the job,
# installs WASM, deploys frontend, and reports back.

name: Test Deploy New Realm

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        default: test
        options:
          - test
          - staging
          - demo

      artifact_version:
        description: "Artifact version: 'latest' or semver (e.g. 0.3.2)"
        required: false
        default: "latest"

      cleanup:
        description: "Delete test canisters after verification"
        required: false
        type: boolean
        default: true

concurrency:
  group: test-deploy-new-realm-${{ inputs.network }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-new-realm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Test parameters
        run: |
          echo "Network:          ${{ inputs.network }}"
          echo "Artifact version: ${{ inputs.artifact_version || 'latest' }}"
          echo "Cleanup:          ${{ inputs.cleanup }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Resolve artifact URLs
        id: artifacts
        run: |
          python3 - <<'PY'
          import json, os, urllib.request

          version = "${{ inputs.artifact_version || 'latest' }}"
          repo = "smart-social-contracts/realms"

          if version == "latest":
              with urllib.request.urlopen(f"https://api.github.com/repos/{repo}/releases/latest", timeout=30) as r:
                  release = json.loads(r.read())
              version = release["tag_name"].lstrip("v")

          backend = f"https://github.com/{repo}/releases/download/v{version}/realm_backend.wasm.gz"
          frontend = f"https://github.com/{repo}/releases/download/v{version}/realm_frontend.tar.gz"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"backend_url={backend}\n")
              f.write(f"frontend_url={frontend}\n")
              f.write(f"version={version}\n")

          print(f"Resolved version: {version}")
          print(f"Backend:  {backend}")
          print(f"Frontend: {frontend}")
          PY

      - name: Submit new realm deployment
        id: deploy
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys

          network = "${{ inputs.network }}"
          backend_url = "${{ steps.artifacts.outputs.backend_url }}"
          frontend_url = "${{ steps.artifacts.outputs.frontend_url }}"

          registry_ids = json.loads(open("canister_ids.json").read())
          registry_id = registry_ids["realm_registry_backend"][network]

          manifest = json.dumps({
              "name": "test-realm-ci",
              "description": "CI test realm — auto-created by test-deploy-new-realm.yml",
              "network": network,
              "deploy_mode": "install",
              "artifacts": {
                  "realm_backend": backend_url,
                  "realm_frontend": frontend_url,
              },
              "realm": {
                  "name": "test-realm-ci",
                  "display_name": "CI Test Realm",
                  "description": "Automated test realm",
              },
          })

          escaped = manifest.replace("\\", "\\\\").replace('"', '\\"')
          candid_arg = f'("{escaped}")'

          result = subprocess.run(
              ["dfx", "canister", "call", registry_id, "request_deployment",
               candid_arg, "--network", network, "--output", "json"],
              capture_output=True, text=True,
          )

          if result.returncode != 0:
              print(f"::error::request_deployment failed: {result.stderr}")
              sys.exit(1)

          raw = result.stdout.strip()
          if raw.startswith('"'):
              data = json.loads(json.loads(raw))
          else:
              data = json.loads(raw)

          print(f"Response: {json.dumps(data, indent=2)}")

          if not data.get("success"):
              print(f"::error::Deployment rejected: {data.get('error', 'unknown')}")
              sys.exit(1)

          job_id = data.get("job_id", "")
          print(f"Job ID: {job_id}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"job_id={job_id}\n")
              f.write(f"registry_id={registry_id}\n")
          PY

      - name: Poll for completion
        run: |
          python3 - <<'PY'
          import json, subprocess, sys, time

          network = "${{ inputs.network }}"
          job_id = "${{ steps.deploy.outputs.job_id }}"
          installer_ids = json.loads(open("canister_ids.json").read())
          installer_id = installer_ids["realm_installer"][network]

          print(f"Polling installer {installer_id} for job {job_id}...")

          start = time.time()
          timeout = 300
          interval = 10

          while time.time() - start < timeout:
              time.sleep(interval)
              elapsed = int(time.time() - start)

              try:
                  result = subprocess.run(
                      ["dfx", "canister", "call", installer_id,
                       "get_deployment_job_status", f'("{job_id}")',
                       "--network", network, "--output", "json", "--query"],
                      capture_output=True, text=True,
                  )
                  if result.returncode != 0:
                      print(f"  [{elapsed}s] dfx error: {result.stderr[:200]}")
                      continue

                  data = json.loads(result.stdout.strip())
                  ok = data.get("Ok") or (data if "job_id" in data else None)
                  if ok:
                      status = ok.get("status", "unknown")
                      print(f"  [{elapsed}s] Status: {status}")
                      if status == "completed":
                          backend_id = ok.get("backend_canister_id", "")
                          frontend_id = ok.get("frontend_canister_id", "")
                          print(f"Deployment succeeded!")
                          print(f"  Backend:  {backend_id}")
                          print(f"  Frontend: {frontend_id}")

                          import os
                          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                              f.write(f"backend_id={backend_id}\n")
                              f.write(f"frontend_id={frontend_id}\n")
                          sys.exit(0)
                      elif status in ("failed", "failed_verification", "cancelled"):
                          error = ok.get("error", "")
                          print(f"::error::Deployment failed: {error}")
                          sys.exit(1)
                  else:
                      err = data.get("Err", {})
                      print(f"  [{elapsed}s] Poll error: {err}")

              except Exception as e:
                  print(f"  [{elapsed}s] Error: {e}")

          print(f"::error::Timeout after {timeout}s")
          sys.exit(1)
          PY

      - name: Smoke test new realm
        if: success()
        run: |
          NETWORK="${{ inputs.network }}"
          BACKEND="${{ steps.deploy.outputs.backend_id }}"
          FRONTEND="${{ steps.deploy.outputs.frontend_id }}"

          if [ -n "$BACKEND" ]; then
            echo "Testing backend $BACKEND..."
            dfx canister call "$BACKEND" status '()' --network "$NETWORK" --output json
            echo "  backend: OK"
          fi

          if [ -n "$FRONTEND" ]; then
            echo "Testing frontend $FRONTEND..."
            if curl -sf "https://${FRONTEND}.icp0.io/" -o /dev/null; then
              echo "  frontend: OK"
            else
              echo "::warning::Frontend not yet reachable (may need time to propagate)"
            fi
          fi

      - name: Cleanup test canisters
        if: always() && inputs.cleanup == 'true'
        continue-on-error: true
        run: |
          NETWORK="${{ inputs.network }}"
          BACKEND="${{ steps.deploy.outputs.backend_id }}"
          FRONTEND="${{ steps.deploy.outputs.frontend_id }}"

          if [ -n "$BACKEND" ]; then
            echo "Stopping and deleting backend $BACKEND..."
            dfx canister stop "$BACKEND" --network "$NETWORK" || true
            dfx canister delete "$BACKEND" --network "$NETWORK" --yes || true
          fi

          if [ -n "$FRONTEND" ]; then
            echo "Stopping and deleting frontend $FRONTEND..."
            dfx canister stop "$FRONTEND" --network "$NETWORK" || true
            dfx canister delete "$FRONTEND" --network "$NETWORK" --yes || true
          fi

          echo "Cleanup complete"
