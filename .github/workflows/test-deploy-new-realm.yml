# test-deploy-new-realm.yml — end-to-end test for new realm creation.
#
# Submits a deployment request with no canister IDs, so the installer
# creates new canisters via CycleOps. The deployer picks up the job,
# installs WASM, deploys frontend, and reports back.

name: Test Deploy New Realm

on:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network"
        required: true
        type: choice
        default: test
        options:
          - test
          - staging
          - demo

      artifact_version:
        description: "Artifact version: 'latest' or semver (e.g. 0.3.2)"
        required: false
        default: "latest"

      cleanup:
        description: "Delete test canisters after verification"
        required: false
        type: boolean
        default: true

concurrency:
  group: test-deploy-new-realm-${{ inputs.network }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  test-new-realm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Test parameters
        run: |
          echo "Network:          ${{ inputs.network }}"
          echo "Artifact version: ${{ inputs.artifact_version || 'latest' }}"
          echo "Cleanup:          ${{ inputs.cleanup }}"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Deploy new test realm
        run: |
          realms mundus deploy-new test-realm-ci \
            --network "${{ inputs.network }}" \
            --version "${{ inputs.artifact_version || 'latest' }}" \
            --display-name "CI Test Realm" \
            --description "Automated test realm — created by test-deploy-new-realm.yml"
