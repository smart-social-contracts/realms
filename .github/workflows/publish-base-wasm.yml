# Publish Base WASM to File Registry
#
# Builds the realm backend WASM (Layer 1) and uploads it to the file
# registry canister under namespace: wasm/
# File path: realm-base-{version}.wasm.gz
#
# Can be triggered manually or called from the release workflow.
# Requires:
#   - FILE_REGISTRY_CANISTER_ID (repository variable)
#   - DFX_IDENTITY_PEM (repository secret — controller/publisher PEM key)
#
# For WASMs > 1 MB, uses chunked upload (store_file_chunk + finalize_chunked_file).
#
# Refs: https://github.com/smart-social-contracts/realms/issues/168

name: Publish Base WASM

on:
  workflow_dispatch:
    inputs:
      network:
        description: "IC network"
        required: true
        type: choice
        options:
          - ic
          - staging
        default: ic
      version:
        description: "Version label (e.g. 1.2.3). Leave empty to read from version.txt"
        required: false
        type: string
  workflow_call:
    inputs:
      network:
        required: false
        type: string
        default: ic
      version:
        required: false
        type: string

env:
  PYTHON_VERSION: "3.10"
  DFX_VERSION: "0.31.0"
  CHUNK_SIZE_BYTES: "786432"  # 768 KB per chunk (under 2 MB ingress limit after b64)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        uses: dfinity/setup-dfx@main
        with:
          dfx-version: ${{ env.DFX_VERSION }}

      - name: Configure dfx identity
        run: |
          mkdir -p ~/.config/dfx/identity/ci
          echo "${{ secrets.DFX_IDENTITY_PEM }}" > ~/.config/dfx/identity/ci/identity.pem
          chmod 600 ~/.config/dfx/identity/ci/identity.pem
          dfx identity use ci

      - name: Determine version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(cat version.txt 2>/dev/null || echo "0.0.0")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Python dependencies
        run: |
          pip install -r src/realm_backend/requirements.txt 2>/dev/null || true
          pip install basilisk

      - name: Build base WASM
        run: |
          # Layered Realm (Issue #168): build a true base WASM with zero
          # bundled extensions. The recipe lives in scripts/build_base_wasm.py
          # so it stays identical between this CI workflow, the
          # `layered-deploy-dominion.yml` workflow, and any operator running
          # the build locally. Do NOT inline-fork the recipe here — change
          # `scripts/build_base_wasm.py` instead.
          python3 scripts/build_base_wasm.py --keep-stubs
          ls -la .basilisk/realm_backend/realm_backend.wasm

      - name: Compress WASM
        run: |
          gzip -k .basilisk/realm_backend/realm_backend.wasm
          WASM_PATH=".basilisk/realm_backend/realm_backend.wasm.gz"
          WASM_SIZE=$(stat -c %s "$WASM_PATH")
          echo "WASM size: $WASM_SIZE bytes"
          echo "wasm_path=$WASM_PATH" >> $GITHUB_ENV
          echo "wasm_size=$WASM_SIZE" >> $GITHUB_ENV

      - name: Upload WASM to registry (chunked)
        env:
          REGISTRY_CANISTER: ${{ vars.FILE_REGISTRY_CANISTER_ID }}
          NETWORK: ${{ inputs.network || 'ic' }}
        run: |
          if [ -z "$REGISTRY_CANISTER" ]; then
            echo "::error::FILE_REGISTRY_CANISTER_ID variable not set"
            exit 1
          fi

          VERSION="${{ steps.version.outputs.version }}"
          NAMESPACE="wasm"
          FILE_PATH="realm-base-${VERSION}.wasm.gz"
          WASM_FILE="${wasm_path}"
          CHUNK_SIZE="${CHUNK_SIZE_BYTES}"

          echo "Uploading $FILE_PATH to ${NAMESPACE}/ on ${REGISTRY_CANISTER}"
          echo "  File size: ${wasm_size} bytes"
          echo "  Chunk size: ${CHUNK_SIZE} bytes"

          # Calculate total chunks
          TOTAL_CHUNKS=$(( (wasm_size + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          echo "  Total chunks: ${TOTAL_CHUNKS}"

          # Upload chunks
          for ((i=0; i<TOTAL_CHUNKS; i++)); do
            SKIP=$((i * CHUNK_SIZE))
            CHUNK_B64=$(dd if="$WASM_FILE" bs=1 skip=$SKIP count=$CHUNK_SIZE 2>/dev/null | base64 -w0)

            PAYLOAD=$(python -c "
          import json
          print(json.dumps({
              'namespace': '${NAMESPACE}',
              'path': '${FILE_PATH}',
              'chunk_index': $i,
              'total_chunks': $TOTAL_CHUNKS,
              'data_b64': '${CHUNK_B64}',
              'content_type': 'application/wasm'
          }))
          ")
            CANDID_ARG="(\"$(echo "$PAYLOAD" | sed 's/\\/\\\\/g; s/"/\\"/g')\")"

            echo "  Uploading chunk $((i+1))/${TOTAL_CHUNKS}..."
            dfx canister call --network "$NETWORK" "$REGISTRY_CANISTER" store_file_chunk "$CANDID_ARG" || {
              echo "::error::Failed to upload chunk $i"
              exit 1
            }
          done

          # Finalize
          echo "  Finalizing..."
          FINALIZE_PAYLOAD=$(python -c "import json; print(json.dumps({'namespace': '${NAMESPACE}', 'path': '${FILE_PATH}'}))")
          CANDID_ARG="(\"$(echo "$FINALIZE_PAYLOAD" | sed 's/\\/\\\\/g; s/"/\\"/g')\")"
          dfx canister call --network "$NETWORK" "$REGISTRY_CANISTER" finalize_chunked_file "$CANDID_ARG" || {
            echo "::error::Failed to finalize chunked upload"
            exit 1
          }

          # Mark namespace as published
          PUB_PAYLOAD=$(python -c "import json; print(json.dumps({'namespace': '${NAMESPACE}'}))")
          PUB_ARG="(\"$(echo "$PUB_PAYLOAD" | sed 's/\\/\\\\/g; s/"/\\"/g')\")"
          echo "  Publishing namespace ${NAMESPACE}..."
          dfx canister call --network "$NETWORK" "$REGISTRY_CANISTER" publish_namespace "$PUB_ARG" || {
            echo "::error::Failed to publish namespace"
            exit 1
          }

          echo "✅ Base WASM published: ${NAMESPACE}/${FILE_PATH}"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## 🔧 Base WASM Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "**File:** \`wasm/realm-base-${VERSION}.wasm.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${wasm_size} bytes" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ vars.FILE_REGISTRY_CANISTER_ID }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Network:** \`${{ inputs.network || 'ic' }}\`" >> $GITHUB_STEP_SUMMARY
