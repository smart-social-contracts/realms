# Reusable workflow: deploy a mundus stack to IC via deploy_direct.py.
# Used by CI (main → staging) and by manual "Deploy IC environment" (test/demo/staging).

name: _deploy-ic-mundus

on:
  workflow_call:
    inputs:
      mundus_descriptor:
        description: "Path to v2 mundus YAML (e.g. deployments/test-mundus-layered.yml)"
        type: string
        required: true
      artifact_network:
        description: "Network name for upload_ci_artifacts.py (staging, demo, test)"
        type: string
        required: true
      python-version:
        type: string
        default: "3.10"
      node-version:
        type: string
        default: "20"
    secrets:
      IC_IDENTITY_PEM:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"
      - name: Install npm workspace dependencies
        run: npm ci --legacy-peer-deps
      - name: Install realms CLI + Python deps
        run: |
          pip install -r requirements.txt
          pip install -e cli/
          pip install pyyaml
      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"
      - name: Deploy via queue
        run: |
          python3 scripts/request_deployment.py \
              --file "${{ inputs.mundus_descriptor }}"

      - name: Upload build artifacts to deploy service cache
        if: always()
        run: |
          pip install requests
          python3 scripts/upload_ci_artifacts.py --network "${{ inputs.artifact_network }}"
        continue-on-error: true
