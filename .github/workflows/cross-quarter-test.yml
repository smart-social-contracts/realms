# cross-quarter-test.yml — strict unit tests for inter-canister addressing.
#
# Runs the RealmRef + cross-quarter resolution / gossip / EntityMigration tests
# on every change to that code. Kept separate from the broad `unit` job in
# ci-pr.yml (which is advisory via `|| true` because some unrelated legacy tests
# fail against the pinned ic-python-db); these tests MUST pass.
#
# See issue #156 (Quarters: Horizontal Scalability Architecture) — addendum on
# standard inter-canister addressing & entity mobility.

name: Cross-Quarter Addressing Tests

on:
  push:
    branches: [main]
    paths:
      - "src/realm_backend/core/realm_ref.py"
      - "src/realm_backend/core/cross_quarter.py"
      - "src/realm_backend/ggg/governance/entity_migration.py"
      - "src/realm_backend/api/cross_quarter.py"
      - "cli/tests/test_realm_ref.py"
      - "cli/tests/test_cross_quarter.py"
      - ".github/workflows/cross-quarter-test.yml"
  pull_request:
    paths:
      - "src/realm_backend/core/realm_ref.py"
      - "src/realm_backend/core/cross_quarter.py"
      - "src/realm_backend/ggg/governance/entity_migration.py"
      - "src/realm_backend/api/cross_quarter.py"
      - "cli/tests/test_realm_ref.py"
      - "cli/tests/test_cross_quarter.py"
      - ".github/workflows/cross-quarter-test.yml"
  workflow_dispatch:

concurrency:
  group: cross-quarter-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e cli/
          pip install pytest
      - name: Run cross-quarter addressing tests (strict)
        run: |
          pytest -v \
            cli/tests/test_realm_ref.py \
            cli/tests/test_cross_quarter.py
