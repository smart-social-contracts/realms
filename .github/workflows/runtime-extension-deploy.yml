name: Runtime Extension Deploy

# Runs scripts/deploy_runtime_extension_to_staging.sh inside CI using the
# same identity (secrets.IC_IDENTITY_PEM) that the main `Deploy` workflow
# uses, so it has wallet + controller rights on staging canisters.
#
# Use this AFTER the regular `Deploy` workflow has upgraded the target
# realm_backend with the new query method (get_extension_frontend_info).
# Issue #168 — Layered realm deployment, Layer 2 (frontend half).

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'dfx network (staging or demo)'
        required: true
        type: choice
        options:
          - staging
          - demo
        default: staging

      realm_backend:
        description: 'Target realm_backend canister id (e.g. ijdaw-... for Dominion)'
        required: true

      extension_id:
        description: 'Extension id to publish + install'
        required: true
        default: test_bench

      extension_version:
        description: 'Extension version (leave empty to read from manifest.json)'
        required: false
        default: ''

      file_registry:
        description: 'Existing file_registry canister id on the network (leave empty to dfx-deploy)'
        required: false
        default: ''

      extensions_branch:
        description: 'realms-extensions branch to use (must contain extensions/<id>/frontend-rt/)'
        required: true
        default: feat/runtime-frontend-bundle

      commit:
        description: 'realms commit SHA to use (leave empty for the workflow ref)'
        required: false
        default: ''

      topup_icp:
        description: 'Convert N ICP to cycles on the CI identity before deploying (leave empty to skip).  e.g. 0.5'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Determine commit SHA
        id: commit
        run: |
          if [ -n "${{ inputs.commit }}" ]; then
            echo "deploy_commit=${{ inputs.commit }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure git for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout realms
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.commit.outputs.deploy_commit }}
          submodules: false

      - name: Checkout realms-extensions @ ${{ inputs.extensions_branch }}
        uses: actions/checkout@v4
        with:
          repository: smart-social-contracts/realms-extensions
          ref: ${{ inputs.extensions_branch }}
          path: external/realms-extensions

      - name: Print run parameters
        run: |
          echo "╭────────────────────────────────────────╮"
          echo "│ ⚡ Runtime Extension Deploy (#168 L2)  │"
          echo "╰────────────────────────────────────────╯"
          echo "📡 Network:         ${{ inputs.network }}"
          echo "🏛️  Realm backend:   ${{ inputs.realm_backend }}"
          echo "🧩 Extension:       ${{ inputs.extension_id }}@${{ inputs.extension_version || 'manifest' }}"
          echo "📦 File registry:   ${{ inputs.file_registry || '(deploy if missing)' }}"
          echo "🌿 Extensions branch: ${{ inputs.extensions_branch }}"
          echo "🔀 realms commit:   ${{ steps.commit.outputs.deploy_commit }}"

      - name: Run deploy_runtime_extension_to_staging.sh in icp-dev-env
        run: |
          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem
          mkdir -p deploy-logs

          docker pull ghcr.io/smart-social-contracts/icp-dev-env:b26e7e9

          # Build optional flags
          VERSION_FLAG=""
          if [ -n "${{ inputs.extension_version }}" ]; then
            VERSION_FLAG="--version ${{ inputs.extension_version }}"
          fi
          REGISTRY_FLAG=""
          if [ -n "${{ inputs.file_registry }}" ]; then
            REGISTRY_FLAG="--file-registry ${{ inputs.file_registry }}"
          fi

          docker run --rm \
            -v "$(pwd):/workspace" \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/deploy-logs:/app/deploy-logs" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            -w /workspace \
            ghcr.io/smart-social-contracts/icp-dev-env:b26e7e9 \
            bash -c "(set -e; \
                     dfxvm install 0.31.0; \
                     pip install -q -r requirements.txt; \
                     dfx identity import my-identity /app/identity.pem --storage-mode=plaintext --force; \
                     dfx identity use my-identity; \
                     echo '── Pre-flight: identity + cycles balance ──'; \
                     echo \"Principal:  \$(dfx identity get-principal)\"; \
                     echo -n 'Cycles:     '; dfx cycles balance --network ${{ inputs.network }} || true; \
                     echo -n 'ICP:        '; dfx ledger balance --network ${{ inputs.network }} 2>&1 | head -1 || true; \
                     echo -n 'Wallet:     '; dfx identity get-wallet --network ${{ inputs.network }} 2>&1 | head -1 || true; \
                     echo '───────────────────────────────────────────'; \
                     if [ -n '${{ inputs.topup_icp }}' ]; then \
                       echo '⚡ Converting ${{ inputs.topup_icp }} ICP to cycles on ${{ inputs.network }}...'; \
                       dfx cycles convert --amount ${{ inputs.topup_icp }} --network ${{ inputs.network }} --yes; \
                       echo -n 'New cycles:  '; dfx cycles balance --network ${{ inputs.network }}; \
                       echo '───────────────────────────────────────────'; \
                     fi; \
                     bash scripts/deploy_runtime_extension_to_staging.sh \
                       --network ${{ inputs.network }} \
                       --realm-backend ${{ inputs.realm_backend }} \
                       --extension-id ${{ inputs.extension_id }} \
                       --extensions-repo /workspace/external/realms-extensions \
                       $VERSION_FLAG $REGISTRY_FLAG \
                     ); EXIT_CODE=\$?; \
                     cp -f dfx.log /app/deploy-logs/ 2>/dev/null || true; \
                     cp -f dfx2.log /app/deploy-logs/ 2>/dev/null || true; \
                     exit \$EXIT_CODE"

          rm identity.pem

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-ext-deploy-logs-${{ github.run_id }}
          path: deploy-logs/
          retention-days: 14
