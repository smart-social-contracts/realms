name: Deploy

# Unified deployment workflow replacing manual-deploy-staging.yml and manual-deploy-demo.yml
# See: https://github.com/smart-social-contracts/realms/issues/160

on:
  workflow_dispatch:
    inputs:
      descriptor:
        description: 'Deployment descriptor YAML file path'
        required: true
        type: choice
        options:
          - deployments/staging-mundus.yml
          - deployments/staging-realm1-backend.yml
          - deployments/staging-realm2-backend.yml
          - deployments/staging-realm3-backend.yml
          - deployments/staging-realm1-frontend.yml
          - deployments/staging-registry.yml
          - deployments/demo-mundus.yml
        default: deployments/staging-mundus.yml

      source:
        description: 'Code source: docker (pre-built image) or checkout (build from source)'
        required: true
        type: choice
        options:
          - docker
          - checkout
        default: docker

      commit:
        description: 'Commit SHA (for docker source — leave empty for latest main)'
        required: false
        default: ''

      subtypes_override:
        description: 'Override subtypes from descriptor (leave empty for descriptor default)'
        required: false
        type: choice
        options:
          - ''
          - backend
          - frontend
          - all
        default: ''

      mode_override:
        description: 'Override deploy mode (leave empty for descriptor default)'
        required: false
        type: choice
        options:
          - ''
          - upgrade
          - reinstall
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Determine commit SHA
        id: commit
        run: |
          if [ -n "${{ inputs.commit }}" ]; then
            echo "deploy_commit=${{ inputs.commit }}" >> $GITHUB_OUTPUT
          else
            echo "deploy_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure git for submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ steps.commit.outputs.deploy_commit }}
          submodules: recursive

      - name: Print deployment parameters
        run: |
          echo "╭────────────────────────────────────────╮"
          echo "│ 🚀 Unified Deployment (issue #160)     │"
          echo "╰────────────────────────────────────────╯"
          echo "📄 Descriptor:  ${{ inputs.descriptor }}"
          echo "💻 Source:       ${{ inputs.source }}"
          echo "🔀 Commit:       ${{ steps.commit.outputs.deploy_commit }}"
          echo "🔧 Subtypes:     ${{ inputs.subtypes_override || '(from descriptor)' }}"
          echo "🔄 Mode:         ${{ inputs.mode_override || '(from descriptor)' }}"
          echo ""
          echo "📝 Descriptor contents:"
          cat "${{ inputs.descriptor }}"

      - name: Login to GitHub Container Registry
        if: inputs.source == 'docker'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker source: use pre-built image ──
      - name: Deploy via Docker image
        if: inputs.source == 'docker'
        run: |
          DEPLOY_COMMIT="${{ steps.commit.outputs.deploy_commit }}"

          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem

          # Pull the demo image (includes extensions)
          docker pull ghcr.io/${{ github.repository_owner }}/realms:demo-${DEPLOY_COMMIT}

          # Build override flags
          OVERRIDE_FLAGS=""
          if [ -n "${{ inputs.subtypes_override }}" ]; then
            OVERRIDE_FLAGS="$OVERRIDE_FLAGS --subtypes ${{ inputs.subtypes_override }}"
          fi
          if [ -n "${{ inputs.mode_override }}" ]; then
            OVERRIDE_FLAGS="$OVERRIDE_FLAGS --mode ${{ inputs.mode_override }}"
          fi

          docker run --rm \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/deployments:/app/deployments" \
            -v "$(pwd)/deploy-logs:/app/deploy-logs" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            ghcr.io/${{ github.repository_owner }}/realms:demo-${DEPLOY_COMMIT} \
            bash -c "(dfx identity import my-identity /app/identity.pem --storage-mode=plaintext --force && \
                     dfx identity use my-identity && \
                     pip install -q pyyaml && \
                     python scripts/deploy.py --file /app/${{ inputs.descriptor }} \
                       --identity my-identity \
                       $OVERRIDE_FLAGS); \
                     EXIT_CODE=\$?; \
                     mkdir -p /app/deploy-logs && \
                     cp -f dfx.log /app/deploy-logs/ 2>/dev/null || true && \
                     cp -f dfx2.log /app/deploy-logs/ 2>/dev/null || true && \
                     cp -f realms.log /app/deploy-logs/ 2>/dev/null || true; \
                     exit \$EXIT_CODE"

          rm identity.pem

      # ── Checkout source: build from checked-out code ──
      - name: Deploy from checked-out source
        if: inputs.source == 'checkout'
        run: |
          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem

          # Use the base dev-env image with checked-out code mounted
          docker pull ghcr.io/smart-social-contracts/icp-dev-env:b26e7e9

          # Build override flags
          OVERRIDE_FLAGS=""
          if [ -n "${{ inputs.subtypes_override }}" ]; then
            OVERRIDE_FLAGS="$OVERRIDE_FLAGS --subtypes ${{ inputs.subtypes_override }}"
          fi
          if [ -n "${{ inputs.mode_override }}" ]; then
            OVERRIDE_FLAGS="$OVERRIDE_FLAGS --mode ${{ inputs.mode_override }}"
          fi

          docker run --rm \
            -v "$(pwd):/workspace" \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/deploy-logs:/app/deploy-logs" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            -w /workspace \
            ghcr.io/smart-social-contracts/icp-dev-env:b26e7e9 \
            bash -c "(pip install -q -r requirements.txt && \
                     pip install -q pyyaml && \
                     pip install -q -e cli/ && \
                     dfx identity import my-identity /app/identity.pem --storage-mode=plaintext --force && \
                     dfx identity use my-identity && \
                     python scripts/deploy.py --file ${{ inputs.descriptor }} \
                       --identity my-identity \
                       $OVERRIDE_FLAGS); \
                     EXIT_CODE=\$?; \
                     mkdir -p /app/deploy-logs && \
                     cp -f dfx.log /app/deploy-logs/ 2>/dev/null || true && \
                     cp -f dfx2.log /app/deploy-logs/ 2>/dev/null || true && \
                     cp -f realms.log /app/deploy-logs/ 2>/dev/null || true; \
                     exit \$EXIT_CODE"

          rm identity.pem

      - name: Upload deployment logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}
          path: deploy-logs/
          retention-days: 7
