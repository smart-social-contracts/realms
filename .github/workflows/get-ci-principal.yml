name: Get CASALS_CI_PEM principal
on: workflow_dispatch
jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - run: npm install -g @icp-sdk/icp-cli
      - name: Print principal
        env:
          CASALS_CI_PEM: ${{ secrets.CASALS_CI_PEM }}
        run: |
          printf '%s' "$CASALS_CI_PEM" > /tmp/ci.pem
          icp identity import casals-ci --from-pem /tmp/ci.pem --storage plaintext
          echo "CASALS_CI_PEM principal: $(icp identity principal --identity casals-ci)"
