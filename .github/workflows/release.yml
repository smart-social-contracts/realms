name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      publish_to_registry:
        description: 'Also publish artifacts to file_registry on all environments'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest extensions from main
        run: git submodule update --remote extensions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semver build twine
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity (Casals CI key)
        if: ${{ inputs.publish_to_registry == true }}
        env:
          CASALS_CI_PEM: ${{ secrets.CASALS_CI_PEM }}
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          PEM="${CASALS_CI_PEM:-$IC_IDENTITY_PEM}"
          if [ -z "$PEM" ]; then
            echo "::error::Neither CASALS_CI_PEM nor IC_IDENTITY_PEM is set." >&2
            exit 1
          fi
          printf '%s' "$PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"
          echo "release identity principal: $(dfx identity get-principal)"

      # Bump version
      - name: Bump version
        id: bump_version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ ! -f "version.txt" ]; then
            echo "0.1.0" > version.txt
          fi

          CURRENT_VERSION=$(cat version.txt)
          NEW_VERSION=$(python -c "import semver; v=semver.VersionInfo.parse('${CURRENT_VERSION}'); print(v.bump_${{ github.event.inputs.release_type || 'patch' }}())")

          echo "${NEW_VERSION}" > version.txt

          sed -i "s/version = \".*\"/version = \"${NEW_VERSION}\"/" cli/pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" cli/realms/__init__.py

          sed -i "s#deploy_release_tag: viteEnv.VITE_DEPLOY_RELEASE_TAG || 'v[^']*'#deploy_release_tag: viteEnv.VITE_DEPLOY_RELEASE_TAG || 'v${NEW_VERSION}'#" \
            src/realm_registry_frontend/src/lib/config.js

          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        run: |
          TAG="v${{ steps.bump_version.outputs.NEW_VERSION }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "❌ ERROR: Release $TAG already exists!"
            exit 1
          fi
          echo "✅ Release $TAG does not exist yet, proceeding..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build artifacts
      - name: Build backend WASM
        run: |
          export CANISTER_CANDID_PATH="$(pwd)/src/realm_backend/realm_backend.did"
          python -m basilisk realm_backend src/realm_backend/main.py
          gzip -k .basilisk/realm_backend/realm_backend.wasm
          mv .basilisk/realm_backend/realm_backend.wasm.gz ./realm_backend.wasm.gz
          echo "✅ Backend WASM built ($(stat -c%s realm_backend.wasm.gz) bytes)"

      - name: Generate Candid declarations
        run: |
          mkdir -p src/realm_frontend/src/lib/declarations
          cp -r src/declarations/realm_backend src/realm_frontend/src/lib/declarations/realm_backend
          cp src/realm_backend/realm_backend.did ./realm_backend.did
          echo "✅ Candid declarations copied, DID file ready"

      - name: Build frontend
        run: |
          cd src/realm_frontend
          npm install --legacy-peer-deps
          npm run build
          cd dist
          tar czf ../../../realm_frontend.tar.gz .
          cd ../../..
          echo "✅ Frontend tarball built ($(stat -c%s realm_frontend.tar.gz) bytes)"

      - name: Compute release asset checksums
        run: |
          echo "# SHA-256 checksums for release assets" > checksums.txt
          for f in realm_backend.wasm.gz realm_backend.did realm_frontend.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Build and publish CLI to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd cli
          PYPROJECT_VERSION=$(grep -Po '^version = "\K[^"]*' pyproject.toml)
          INIT_VERSION=$(grep -Po '(?<=__version__ = ")[^"]*' realms/__init__.py)
          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: Version mismatch between pyproject.toml and __init__.py"
            exit 1
          fi
          python -m build
          twine check dist/*
          twine upload dist/*
          echo "✅ CLI published to PyPI: v${{ steps.bump_version.outputs.NEW_VERSION }}"

      # Create GitHub release (reads notes file from workspace before we clean it up)
      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.NEW_VERSION }}
          name: Release v${{ steps.bump_version.outputs.NEW_VERSION }}
          body_path: .github/RELEASE_NOTES_NEXT.md
          fail_on_unmatched_files: true
          files: |
            realm_backend.wasm.gz
            realm_backend.did
            realm_frontend.tar.gz
            checksums.txt

      # Commit version bump + remove the consumed release notes file
      - name: Commit and push version changes
        run: |
          git add version.txt cli/pyproject.toml cli/realms/__init__.py \
            src/realm_registry_frontend/src/lib/config.js
          # Remove the release notes file now that the release is published
          if [ -f ".github/RELEASE_NOTES_NEXT.md" ]; then
            git rm .github/RELEASE_NOTES_NEXT.md
          fi
          git commit -m "chore: bump version to ${{ steps.bump_version.outputs.NEW_VERSION }}"
          git remote set-url origin https://${{ secrets.PAT_GITHUB }}@github.com/${{ github.repository }}.git
          git push origin
          echo "✅ Version changes committed and pushed"

      # Publish artifacts to all three environments
      - name: Publish to file_registry — test
        if: ${{ inputs.publish_to_registry == true }}
        run: |
          python3 scripts/publish_build.py \
            --environment test \
            --family realm \
            --component both \
            --version ${{ steps.bump_version.outputs.NEW_VERSION }} \
            --identity ci

      - name: Publish to file_registry — demo
        if: ${{ inputs.publish_to_registry == true }}
        run: |
          python3 scripts/publish_build.py \
            --environment demo \
            --family realm \
            --component both \
            --version ${{ steps.bump_version.outputs.NEW_VERSION }} \
            --identity ci

      - name: Publish to file_registry — staging
        if: ${{ inputs.publish_to_registry == true }}
        run: |
          python3 scripts/publish_build.py \
            --environment staging \
            --family realm \
            --component both \
            --version ${{ steps.bump_version.outputs.NEW_VERSION }} \
            --identity ci

      - name: Summary
        run: |
          echo "═══════════════════════════════════════════════════════"
          echo " Release v${{ steps.bump_version.outputs.NEW_VERSION }} complete"
          echo " GitHub: ${{ steps.create_release.outputs.url }}"
          echo " PyPI:   https://pypi.org/project/realms-gos/${{ steps.bump_version.outputs.NEW_VERSION }}/"
          if [ "${{ inputs.publish_to_registry }}" = "true" ]; then
            echo " file_registry: published to test / demo / staging"
          fi
          echo "═══════════════════════════════════════════════════════"
