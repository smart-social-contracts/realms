name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Pull latest extensions from main
        run: git submodule update --remote extensions
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      
      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install semver build twine
          pip install -r requirements.txt
          pip install -e cli/
      
      # Bump version
      - name: Bump version
        id: bump_version
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Create version file if it doesn't exist
          if [ ! -f "version.txt" ]; then
            echo "0.1.0" > version.txt
          fi
          
          # Calculate new version with Python
          CURRENT_VERSION=$(cat version.txt)
          NEW_VERSION=$(python -c "import semver; v=semver.VersionInfo.parse('${CURRENT_VERSION}'); print(v.bump_${{ github.event.inputs.release_type || 'patch' }}())")
          
          # Update version file
          echo "${NEW_VERSION}" > version.txt
          
          # Update CLI version
          sed -i "s/version = \".*\"/version = \"${NEW_VERSION}\"/" cli/pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${NEW_VERSION}\"/" cli/realms/__init__.py
          
          # Update frontend deploy release tag default
          sed -i "s#deploy_release_tag: viteEnv.VITE_DEPLOY_RELEASE_TAG || 'v[^']*'#deploy_release_tag: viteEnv.VITE_DEPLOY_RELEASE_TAG || 'v${NEW_VERSION}'#" \
            src/realm_registry_frontend/src/lib/config.js
          
          # Store new version for later use
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
      
      - name: Check if release already exists
        run: |
          TAG="v${{ steps.bump_version.outputs.NEW_VERSION }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "❌ ERROR: Release $TAG already exists!"
            exit 1
          fi
          echo "✅ Release $TAG does not exist yet, proceeding..."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Build artifacts directly (no Docker needed)
      - name: Build backend WASM
        run: |
          export CANISTER_CANDID_PATH="$(pwd)/src/realm_backend/realm_backend.did"
          python -m basilisk realm_backend src/realm_backend/main.py
          gzip -k .basilisk/realm_backend/realm_backend.wasm
          mv .basilisk/realm_backend/realm_backend.wasm.gz ./realm_backend.wasm.gz
          echo "✅ Backend WASM built ($(stat -c%s realm_backend.wasm.gz) bytes)"

      - name: Generate Candid declarations
        run: |
          # Copy declarations to where the frontend expects them ($lib/declarations/realm_backend)
          mkdir -p src/realm_frontend/src/lib/declarations
          cp -r src/declarations/realm_backend src/realm_frontend/src/lib/declarations/realm_backend
          cp src/realm_backend/realm_backend.did ./realm_backend.did
          echo "✅ Candid declarations copied to frontend lib, DID file ready"

      - name: Build frontend
        run: |
          cd src/realm_frontend
          npm install --legacy-peer-deps
          npm run build
          cd dist
          tar czf ../../../realm_frontend.tar.gz .
          cd ../../..
          echo "✅ Frontend tarball built ($(stat -c%s realm_frontend.tar.gz) bytes)"
      
      - name: Compute release asset checksums
        run: |
          echo "# SHA-256 checksums for release assets" > checksums.txt
          for f in realm_backend.wasm.gz realm_backend.did realm_frontend.tar.gz; do
            if [ -f "$f" ]; then
              sha256sum "$f" >> checksums.txt
            fi
          done
          cat checksums.txt
      
      - name: Build and publish CLI to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd cli
          
          # Verify version consistency
          PYPROJECT_VERSION=$(grep -Po '^version = "\K[^"]*' pyproject.toml)
          INIT_VERSION=$(grep -Po '(?<=__version__ = ")[^"]*' realms/__init__.py)
          
          echo "Version in pyproject.toml: $PYPROJECT_VERSION"
          echo "Version in __init__.py: $INIT_VERSION"
          
          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "ERROR: Version mismatch"
            exit 1
          fi
          
          # Build and publish
          python -m build
          twine check dist/*
          twine upload dist/*
          
          echo "✅ CLI published to PyPI: v${{ steps.bump_version.outputs.NEW_VERSION }}"
      
      # Commit version changes
      - name: Commit and push version changes
        run: |
          git add version.txt cli/pyproject.toml cli/realms/__init__.py src/realm_registry_frontend/src/lib/config.js
          git commit -m "Bump version to ${{ steps.bump_version.outputs.NEW_VERSION }}"
          git remote set-url origin https://${{ secrets.PAT_GITHUB }}@github.com/${{ github.repository }}.git
          git push origin
          
          echo "✅ Version changes committed and pushed"
      
      # Create GitHub release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.NEW_VERSION }}
          name: Release v${{ steps.bump_version.outputs.NEW_VERSION }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            realm_backend.wasm.gz
            realm_backend.did
            realm_frontend.tar.gz
            checksums.txt
          body: |
            ## 📦 Release Assets
            
            ### 🔧 Canister Artifacts
            - `realm_backend.wasm.gz` + `realm_backend.did` — Backend canister
            - `realm_frontend.tar.gz` — Frontend asset canister dist
            - `checksums.txt` — SHA-256 hashes for all assets above
            
            ### 📦 CLI Tool (PyPI)
            ```bash
            pip install --upgrade realms-gos==${{ steps.bump_version.outputs.NEW_VERSION }}
            ```
            
            ## Deployment
            
            **Via Mundus (decentralized):**
            ```bash
            realms mundus deploy <descriptor.yml> --version ${{ steps.bump_version.outputs.NEW_VERSION }}
            ```
            
            **Install CLI:**
            ```bash
            pip install realms-gos==${{ steps.bump_version.outputs.NEW_VERSION }}
            ```
            
            ## Commit
            ${{ github.sha }}
