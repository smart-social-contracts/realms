# publish-main.yml — build and publish the current main-branch checkout into
# Casals (no semver release required).
#
# Artifacts are versioned as main.<unix_ts>.<git_sha>. Roll them out with:
#   gh workflow run rollout.yml -f version=main ...
# or: realms rollout -v main ...

name: Publish Main

on:
  push:
    branches: [main]
    paths:
      - "src/realm_backend/**"
      - "src/realm_frontend/**"
      - "src/realm_installer/**"
      - "src/realm_registry_backend/**"
      - "src/realm_registry_frontend/**"
      - "src/file_registry/**"
      - "src/file_registry_frontend/**"
      - "src/marketplace_backend/**"
      - "src/marketplace_frontend/**"
      - "src/platform_dashboard_frontend/**"
      - "scripts/publish_build.py"
      - "scripts/build_base_wasm.py"
      - "cli/**"
      - ".github/workflows/publish-main.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (Casals must exist there)"
        required: true
        type: choice
        default: test
        options:
          - test
          - staging
          - demo
      family:
        description: "Artifact family"
        required: true
        type: choice
        default: realm
        options:
          - realm
          - installer
          - registry
          - file-registry
          - dashboard
          - marketplace
      component:
        description: "Which component(s) to build + publish"
        required: true
        type: choice
        default: both
        options:
          - both
          - backend
          - frontend

concurrency:
  group: publish-main-${{ github.ref }}-${{ inputs.environment || 'test' }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "20"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install realms CLI + build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=test" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + publish main snapshot
        run: |
          FAMILY="${{ inputs.family || 'realm' }}"
          COMPONENT="${{ inputs.component || 'both' }}"
          python3 scripts/publish_build.py \
            --environment "${{ steps.env.outputs.target }}" \
            --family "$FAMILY" \
            --component "$COMPONENT" \
            --from-main \
            --identity ci

      - name: Summary
        run: |
          echo "Published main snapshot. Roll out with:"
          echo "  gh workflow run rollout.yml -f environments=${{ steps.env.outputs.target }} -f version=main -f execute=true ..."
