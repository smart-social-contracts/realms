# deploy-mundus.yml — deploy realm canisters via the realms CLI.
#
# Three-job pipeline:
#   1. prepare  — checkout, resolve artifacts, emit realm matrix
#   2. deploy-realm (matrix) — one parallel runner per realm
#   3. smoke-test — verify all deployments succeeded

name: Deploy Mundus

on:
  workflow_dispatch:
    inputs:
      descriptor:
        description: "Mundus descriptor to deploy"
        required: true
        type: choice
        default: deployment-descriptors/staging-mundus-layered.yml
        options:
          - deployment-descriptors/staging-mundus-layered.yml
          - deployment-descriptors/demo-mundus-layered.yml
          - deployment-descriptors/test-mundus-layered.yml

      deploy_mode:
        description: "Deploy mode for realm canisters"
        required: false
        type: choice
        default: reinstall
        options:
          - reinstall
          - upgrade
          - install

      artifact_version:
        description: "Artifact version: 'build' (from source), 'latest', or semver (e.g. 0.3.2)"
        required: false
        default: "build"

      realm:
        description: "Deploy only this realm (leave blank for all)"
        required: false
        default: ""

      canister:
        description: "Deploy only 'backend' or 'frontend' (leave blank for both)"
        required: false
        type: choice
        default: "both"
        options:
          - "both"
          - backend
          - frontend

      skip_extensions:
        description: "Skip extension/codex installation (faster deploys)"
        required: false
        type: boolean
        default: false

      ref:
        description: "Commit/branch to deploy from (defaults to workflow ref)"
        required: false
        default: ""

  workflow_call:
    inputs:
      descriptor:
        description: "Path to mundus YAML"
        type: string
        required: true
      deploy_mode:
        description: "Deploy mode (upgrade/reinstall/install)"
        type: string
        required: false
        default: "upgrade"
      artifact_version:
        description: "Artifact version"
        type: string
        required: false
        default: "build"
      realm:
        description: "Filter to a single realm name (empty = all)"
        type: string
        required: false
        default: ""
      canister:
        description: "Filter to backend/frontend (empty = both)"
        type: string
        required: false
        default: ""
      skip_extensions:
        description: "Skip extension/codex installation"
        type: boolean
        required: false
        default: false
    secrets:
      IC_IDENTITY_PEM:
        required: true

concurrency:
  group: deploy-mundus-${{ inputs.descriptor }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ─── Job 1: Prepare ───────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      realm_matrix: ${{ steps.matrix.outputs.realms }}
      network: ${{ steps.matrix.outputs.network }}
    steps:
      - name: Deploy parameters
        run: |
          echo "Descriptor:        ${{ inputs.descriptor }}"
          echo "Deploy mode:       ${{ inputs.deploy_mode || 'upgrade' }}"
          echo "Artifact version:  ${{ inputs.artifact_version || 'latest' }}"
          echo "Realm filter:      ${{ inputs.realm || '(all)' }}"
          echo "Canister filter:   ${{ inputs.canister || '(both)' }}"
          echo "Skip extensions:   ${{ inputs.skip_extensions || false }}"
          echo "Ref:               ${{ inputs.ref || github.ref }}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build realm matrix
        id: matrix
        run: |
          python3 - <<'PY'
          import json, os, yaml

          desc = yaml.safe_load(open("${{ inputs.descriptor }}"))
          network = desc.get("network", "staging")
          realm_filter = "${{ inputs.realm }}".strip().lower()

          realms = [e for e in desc.get("mundus", []) if e.get("type", "realm") == "realm"]

          if realm_filter:
              realms = [
                  e for e in realms
                  if realm_filter in (e.get("name", "").lower(), e.get("display_name", "").lower())
              ]

          names = [e.get("name", e.get("display_name", "unknown")) for e in realms]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"realms={json.dumps(names)}\n")
              f.write(f"network={network}\n")

          print(f"Matrix: {names}")
          PY

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Top up credits
        run: |
          # Same job: network comes from the "Build realm matrix" step outputs.
          # Using needs.prepare.outputs here is wrong — needs.* is for other jobs only,
          # so NETWORK was always empty and credit top-up was skipped.
          NETWORK="${{ steps.matrix.outputs.network }}"
          if [ -z "$NETWORK" ]; then
            echo "::error::steps.matrix.outputs.network is empty — cannot resolve registry." >&2
            exit 1
          fi
          REGISTRY=$(python3 -c "import json; print(json.load(open('canister_ids.json'))['realm_registry_backend']['$NETWORK'])" 2>/dev/null || echo "")
          if [ -z "$REGISTRY" ]; then
            echo "::error::No realm_registry_backend entry for network '$NETWORK' in canister_ids.json; cannot top up CI credits." >&2
            exit 1
          fi
          PRINCIPAL=$(dfx identity get-principal)
          echo "Topping up 50 credits for $PRINCIPAL (registry=$REGISTRY, network=$NETWORK)..."
          dfx canister call --network ic "$REGISTRY" add_credits \
            "(\"$PRINCIPAL\", 50 : nat64, \"\", \"CI credit top-up\")"
          echo "Credits topped up successfully."

  # ─── Job 2: Deploy each realm in parallel ─────────────────────────────────────
  deploy-realm:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        realm: ${{ fromJson(needs.prepare.outputs.realm_matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Deploy ${{ matrix.realm }}
        run: |
          ARGS=(
            "${{ inputs.descriptor }}"
            --mode "${{ inputs.deploy_mode || 'upgrade' }}"
            --version "${{ inputs.artifact_version || 'latest' }}"
            --realm "${{ matrix.realm }}"
          )
          if [ "${{ inputs.canister }}" != "both" ] && [ -n "${{ inputs.canister }}" ]; then
            ARGS+=(--canister "${{ inputs.canister }}")
          fi
          if [ "${{ inputs.skip_extensions }}" = "true" ]; then
            ARGS+=(--skip-extensions)
          fi

          realms mundus deploy "${ARGS[@]}"

  # ─── Job 3: Smoke test ─────────────────────────────────────────────────────────
  smoke-test:
    needs: [prepare, deploy-realm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Smoke test
        run: |
          python3 - <<'PY'
          import yaml, subprocess, sys, urllib.request

          desc = yaml.safe_load(open("${{ inputs.descriptor }}"))
          network = desc["network"]
          realm_filter = "${{ inputs.realm }}".strip().lower()
          canister_filter = "${{ inputs.canister }}".strip().lower()
          ok = True

          for m in desc.get("mundus", []):
              name = m.get("display_name") or m["name"]

              if realm_filter and realm_filter not in (m.get("name", "").lower(), name.lower()):
                  continue

              backend = m.get("canister_id", "")
              frontend = m.get("frontend_canister_id", "")

              if backend and canister_filter != "frontend":
                  try:
                      subprocess.run(
                          ["dfx", "canister", "call", backend, "status", "()",
                           "--network", network, "--output", "json"],
                          check=True, capture_output=True, text=True,
                      )
                      print(f"  backend  {name}: OK")
                  except subprocess.CalledProcessError as e:
                      print(f"  backend  {name}: FAIL - {e.stderr[:200]}")
                      ok = False

              if frontend and canister_filter != "backend":
                  url = f"https://{frontend}.icp0.io/"
                  try:
                      urllib.request.urlopen(url, timeout=15)
                      print(f"  frontend {name}: OK ({url})")
                  except Exception as e:
                      print(f"  frontend {name}: FAIL - {e}")
                      ok = False

          if not ok:
              sys.exit(1)
          PY
