# deploy-mundus.yml — deploy mundus members via the queue-based architecture.
#
# Uses realm_registry_backend.request_deployment + installer polling.
# If the registry canister has no WASM yet, it is bootstrapped automatically
# via direct dfx install before the queue deploy proceeds.
# Requires infra canisters (file_registry, realm_installer) to already be
# running — use deploy-infra.yml for those.
#
# Supports both manual dispatch (with realm/extension filters, install mode,
# etc.) and reusable workflow_call (used by CI on main → staging).
#
# Optional `realms` / `extensions` filters trim what gets built and
# deployed, so a single-realm iteration takes ~3-5 minutes.

name: Deploy Mundus

on:
  workflow_dispatch:
    inputs:
      descriptor:
        description: "Mundus descriptor to deploy"
        required: true
        type: choice
        default: deployments/staging-mundus-layered.yml
        options:
          - deployments/staging-mundus-layered.yml
          - deployments/demo-mundus-layered.yml
          - deployments/test-mundus-layered.yml

      realms:
        description: "Comma-separated mundus member names to (re)deploy. Leave empty for all (e.g. 'dominion' or 'dominion,agora')."
        required: false
        default: ""

      extensions:
        description: "Comma-separated extension ids to publish + install. Leave empty for all (e.g. 'package_manager,admin_dashboard')."
        required: false
        default: ""

      install_mode:
        description: "Install mode for realm canisters"
        required: false
        type: choice
        default: upgrade
        options:
          - upgrade
          - reinstall
          - install

      skip_base_wasm:
        description: "Skip compiling and deploying the Rust backend WASM."
        required: false
        type: boolean
        default: false

      ref:
        description: "realms commit/branch to deploy from (defaults to the workflow ref)."
        required: false
        default: ""

  workflow_call:
    inputs:
      descriptor:
        description: "Path to v2 mundus YAML (e.g. deployments/staging-mundus-layered.yml)"
        type: string
        required: true
      artifact_network:
        description: "Network name for upload_ci_artifacts.py (staging, demo, test)"
        type: string
        required: true
    secrets:
      IC_IDENTITY_PEM:
        required: true

concurrency:
  group: deploy-mundus-${{ inputs.descriptor }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  deploy-mundus:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Deploy parameters
        run: |
          echo "╭────────────────────────────────────────╮"
          echo "│  Deploy Mundus                         │"
          echo "╰────────────────────────────────────────╯"
          echo "Descriptor:    ${{ inputs.descriptor }}"
          echo "Realms:        ${{ inputs.realms || '(all)' }}"
          echo "Extensions:    ${{ inputs.extensions || '(all from descriptor)' }}"
          echo "Install mode:  ${{ inputs.install_mode || 'upgrade' }}"
          echo "Skip base WASM: ${{ inputs.skip_base_wasm || 'false' }}"
          echo "Ref:           ${{ inputs.ref || github.ref }}"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install npm workspace dependencies
        run: npm ci --legacy-peer-deps

      - name: Install realms CLI + Python deps
        run: |
          pip install -r requirements.txt
          pip install -e cli/
          pip install pyyaml

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Bootstrap registry if empty
        env:
          DESCRIPTOR: ${{ inputs.descriptor }}
        run: |
          python3 - <<'PYEOF'
          import os, sys, yaml, subprocess

          desc = yaml.safe_load(open(os.environ["DESCRIPTOR"]))
          network = desc["network"]
          registry = next(
              (m for m in desc.get("mundus", []) if m.get("type") == "realm_registry"),
              None,
          )
          if not registry:
              print("No realm_registry member in descriptor, skipping bootstrap.")
              sys.exit(0)

          cid = registry["canister_id"]
          print(f"Checking registry {cid} on {network}...")

          result = subprocess.run(
              ["dfx", "canister", "status", cid, "--network", network],
              capture_output=True, text=True,
          )
          if "Module hash: None" in result.stdout or "no wasm module" in result.stderr.lower():
              print(f"Registry {cid} has no WASM — bootstrapping via direct install...")
              subprocess.run(
                  ["python3", "-m", "basilisk", "realm_registry_backend",
                   "src/realm_registry_backend/main.py"],
                  check=True,
                  env={**os.environ, "CANISTER_CANDID_PATH": "src/realm_registry_backend/realm_registry_backend.did"},
              )
              subprocess.run(
                  ["dfx", "canister", "install", cid,
                   "--wasm", ".basilisk/realm_registry_backend/realm_registry_backend.wasm",
                   "--mode", "install", "--yes", "--network", network],
                  check=True,
              )
              print(f"✅ Registry {cid} bootstrapped on {network}")
          else:
              print(f"Registry {cid} already has WASM, proceeding to queue deploy.")
          PYEOF

      - name: Submit queue deployment
        env:
          DESCRIPTOR: ${{ inputs.descriptor }}
          INSTALL_MODE: ${{ inputs.install_mode || 'upgrade' }}
        run: |
          echo "→ python3 scripts/request_deployment.py --file \"$DESCRIPTOR\" --install-mode \"$INSTALL_MODE\""
          python3 scripts/request_deployment.py --file "$DESCRIPTOR" --install-mode "$INSTALL_MODE"

      - name: Upload build artifacts to deploy service cache
        if: always()
        run: |
          pip install requests
          if echo "${{ inputs.descriptor }}" | grep -qE "demo-mundus|/demo-"; then NETWORK=demo
          elif echo "${{ inputs.descriptor }}" | grep -qE "test-mundus|/test-"; then NETWORK=test
          else NETWORK=staging
          fi
          python3 scripts/upload_ci_artifacts.py --network "${NETWORK:-${{ inputs.artifact_network }}}"
        continue-on-error: true

      - name: Print frontend URLs
        if: success()
        run: |
          python3 - <<'PY'
          import os, yaml
          desc = yaml.safe_load(open(os.environ["DESC"]))
          print()
          print("✅ Mundus deploy complete. Live frontends:")
          for m in desc.get("mundus", []):
              fe = m.get("frontend_canister_id")
              cid = m.get("canister_id")
              name = m.get("display_name") or m["name"]
              if fe:
                  print(f"   • {name:30s} → https://{fe}.icp0.io/")
              elif cid and m.get("type", "") in ("dashboard",):
                  print(f"   • {name:30s} → https://{cid}.icp0.io/")
          PY
        env:
          DESC: ${{ inputs.descriptor }}
