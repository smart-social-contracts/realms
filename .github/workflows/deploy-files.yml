name: Deploy File Registry

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        default: staging
        options:
          - test
          - staging
          - demo

      scope:
        description: "What to publish"
        required: true
        type: choice
        default: all
        options:
          - all
          - extensions-only
          - codices-only

      reinstall:
        description: "Wipe file registry first (reinstall canister)"
        required: false
        type: boolean
        default: false

      ref:
        description: "Branch/commit (defaults to main)"
        required: false
        default: ""

concurrency:
  group: deploy-files-${{ inputs.environment }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.11"

jobs:
  publish-files:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Parameters
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Scope:       ${{ inputs.scope }}"
          echo "Reinstall:   ${{ inputs.reinstall }}"
          echo "Ref:         ${{ inputs.ref || github.ref }}"

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dfx
        run: |
          DFXVM_INIT_YES=1 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
          echo "$HOME/.local/share/dfx/bin" >> "$GITHUB_PATH"

      - name: Install realms CLI
        run: |
          pip install -r requirements.txt
          pip install -e cli/

      - name: Configure dfx identity
        env:
          IC_IDENTITY_PEM: ${{ secrets.IC_IDENTITY_PEM }}
        run: |
          if [ -z "$IC_IDENTITY_PEM" ]; then
            echo "::error::IC_IDENTITY_PEM secret is not set." >&2
            exit 1
          fi
          printf '%s' "$IC_IDENTITY_PEM" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import ci /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use ci
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Reset file registry canister
        if: inputs.reinstall
        run: |
          realms files reset \
            --network "${{ inputs.environment }}" \
            --identity ci

      - name: Publish to file registry
        run: |
          SCOPE_FLAG=""
          if [ "${{ inputs.scope }}" = "extensions-only" ]; then
            SCOPE_FLAG="--extensions-only"
          elif [ "${{ inputs.scope }}" = "codices-only" ]; then
            SCOPE_FLAG="--codices-only"
          fi
          realms files publish \
            --network "${{ inputs.environment }}" \
            --identity ci \
            $SCOPE_FLAG

      - name: Review
        run: |
          NETWORK="${{ inputs.environment }}"
          REGISTRY=$(python3 -c "import json; print(json.load(open('canister_ids.json'))['file_registry']['$NETWORK'])")
          echo "Querying file registry stats..."
          dfx canister call "$REGISTRY" get_stats '()' --network "$NETWORK" --query || true
          echo ""
          echo "Extensions:"
          dfx canister call "$REGISTRY" list_extensions '()' --network "$NETWORK" --query || true
          echo ""
          echo "Codices:"
          dfx canister call "$REGISTRY" list_codices '()' --network "$NETWORK" --query || true

      - name: Summary
        run: |
          echo ""
          echo "═══════════════════════════════════════"
          echo " File registry publish complete"
          echo " Environment: ${{ inputs.environment }}"
          echo " Scope:       ${{ inputs.scope }}"
          echo " Reinstall:   ${{ inputs.reinstall }}"
          echo "═══════════════════════════════════════"
