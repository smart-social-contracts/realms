name: Agent Swarm (standalone)

on:
  workflow_dispatch:
    inputs:
      agents_count:
        description: 'Number of agents per realm'
        required: false
        default: '3'
      run_duration_minutes:
        description: 'Overall time budget in minutes'
        required: false
        default: '3'
      agent_timeout_seconds:
        description: 'Timeout per agent call in seconds'
        required: false
        default: '180'
      docker_tag:
        description: 'Docker image tag to use (default: demo-latest)'
        required: false
        default: 'demo-latest'

jobs:
  agent-swarm:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure Ollama pod is running
        if: env.RUNPOD_API_KEY != ''
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          pip install runpod requests >/dev/null 2>&1
          python3 - <<'WAKE_SCRIPT'
          import runpod, os, time, requests as r
          runpod.api_key = os.environ["RUNPOD_API_KEY"]
          OLLAMA_URL = "https://geister-ollama.realmsgos.dev"
          pods = runpod.get_pods()
          pod = next((p for p in pods if p["name"].startswith("geister-main-")), None)
          if not pod:
            print("::warning::No geister-main pod found, skipping wake"); exit(0)
          status = pod.get("desiredStatus", "UNKNOWN")
          print(f"Pod {pod['id']}: {status}")
          if status != "RUNNING":
            print("Starting pod...")
            runpod.resume_pod(pod_id=pod["id"], gpu_count=1)
            for i in range(60):
              time.sleep(5)
              pods = runpod.get_pods()
              p = next((x for x in pods if x["id"] == pod["id"]), None)
              if p and p.get("desiredStatus") == "RUNNING":
                print("Pod is RUNNING"); break
            else:
              print("::warning::Pod did not reach RUNNING within 5min"); exit(0)
          print("Waiting for Ollama to be healthy...")
          for i in range(36):
            try:
              resp = r.get(OLLAMA_URL, timeout=10)
              if resp.status_code == 200:
                print("Ollama is healthy!"); exit(0)
            except Exception:
              pass
            time.sleep(10)
          print("::warning::Ollama not healthy after 6min, proceeding anyway")
          WAKE_SCRIPT

      - name: Run geister agent swarm test on staging
        run: |
          # Store identity in a temporary file
          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem
          
          # Create logs directory for artifacts
          mkdir -p agent_logs
          
          # Pull the image
          docker pull ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }}
          
          # Run agent swarm test inside Docker container (needs dfx for registry list)
          docker run --rm \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/agent_logs:/app/agent_logs" \
            -v "$(pwd)/examples/demo/realm_common/tests/test_agent_swarm.py:/app/examples/demo/realm_common/tests/test_agent_swarm.py" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            -e DFX_NETWORK=staging \
            -e AGENTS_COUNT=${{ github.event.inputs.agents_count || '3' }} \
            -e NETWORK=staging \
            -e AGENT_TIMEOUT_SECONDS=${{ github.event.inputs.agent_timeout_seconds || '180' }} \
            -e RUN_DURATION_MINUTES=${{ github.event.inputs.run_duration_minutes || '3' }} \
            -e LOGS_DIR=/app/agent_logs \
            ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }} \
            bash -c "dfx identity import my-identity /app/identity.pem --storage-mode=plaintext --force && \
                     dfx identity use my-identity && \
                     pip install git+https://github.com/smart-social-contracts/geister.git realms-gos && \
                     cp dfx.template.json dfx.json && \
                     python examples/demo/realm_common/tests/test_agent_swarm.py"
          
          # Clean up
          rm identity.pem
      
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-logs
          path: agent_logs/
          retention-days: 14

      - name: Upload issues report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-issues-report
          path: agent_logs/issues-report.md
          retention-days: 14
          if-no-files-found: ignore
