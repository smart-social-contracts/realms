name: Agent Swarm (standalone)

on:
  workflow_dispatch:
    inputs:
      agents_count:
        description: 'Number of agents per realm'
        required: false
        default: '3'
      run_duration_minutes:
        description: 'Overall time budget in minutes'
        required: false
        default: '45'
      delete_all_agents:
        description: 'Delete all geisters (start fresh)'
        required: false
        type: boolean
        default: true
      docker_tag:
        description: 'Docker image tag to use (default: demo-latest)'
        required: false
        default: 'demo-latest'

jobs:
  agent-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure Ollama pod is running
        if: env.RUNPOD_API_KEY != ''
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          pip install runpod requests >/dev/null 2>&1
          python3 - <<'ENSURE_POD'
          import runpod, os, sys, time, requests as r

          runpod.api_key = os.environ["RUNPOD_API_KEY"]
          OLLAMA_URL = "https://geister-ollama.realmsgos.dev"
          POD_PREFIX = "geister-main-"
          # Config from geister/env
          NETWORK_VOLUME_ID = "99taves6so"
          TEMPLATE_ID = "mli5ubi3cf"
          IMAGE_NAME = "docker.io/smartsocialcontracts/geister:main"
          MAX_GPU_PRICE = 0.30
          MIN_GPU_PRICE = 0.05

          # --- Find existing pod ---
          pods = runpod.get_pods()
          pod = next((p for p in pods if p["name"].startswith(POD_PREFIX)), None)

          if pod:
              status = pod.get("desiredStatus", "UNKNOWN")
              print(f"Found pod {pod['id']}: {status}")
              if status != "RUNNING":
                  print("Resuming pod...")
                  runpod.resume_pod(pod_id=pod["id"], gpu_count=1)
                  for _ in range(60):
                      time.sleep(5)
                      ps = runpod.get_pods()
                      p = next((x for x in ps if x["id"] == pod["id"]), None)
                      if p and p.get("desiredStatus") == "RUNNING":
                          print("Pod is RUNNING"); break
                  else:
                      print("::warning::Pod did not reach RUNNING within 5min, attempting new deploy")
                      pod = None  # fall through to deploy
          
          if not pod:
              print("No running pod found — deploying a new one...")
              gpu_types = runpod.get_gpus()
              affordable = []
              for g in gpu_types:
                  try:
                      detail = runpod.get_gpu(g["id"])
                      price = detail.get("communitySpotPrice") or detail.get("secureSpotPrice")
                      if price and MIN_GPU_PRICE <= price <= MAX_GPU_PRICE:
                          affordable.append({"id": g["id"], "name": detail.get("displayName", g["id"]), "price": price})
                  except Exception:
                      pass
              affordable.sort(key=lambda x: x["price"])
              if not affordable:
                  print(f"::error::No GPUs found between ${MIN_GPU_PRICE} and ${MAX_GPU_PRICE}/hr")
                  sys.exit(1)
              pod_name = f"geister-main-{int(time.time())}"
              created = False
              for gpu in affordable:
                  try:
                      print(f"Trying {gpu['name']} at ${gpu['price']:.3f}/hr...")
                      result = runpod.create_pod(
                          name=pod_name, template_id=TEMPLATE_ID, image_name=IMAGE_NAME,
                          gpu_type_id=gpu["id"], gpu_count=1,
                          network_volume_id=NETWORK_VOLUME_ID, volume_mount_path="/workspace",
                          container_disk_in_gb=20, support_public_ip=True, start_ssh=True,
                          env={"RUNPOD_API_KEY": os.environ["RUNPOD_API_KEY"],
                               "POD_TYPE": "main", "INACTIVITY_TIMEOUT_SECONDS": "3600"})
                      if result and result.get("id"):
                          print(f"✅ Pod created: {result['id']} with {gpu['name']}")
                          created = True; break
                  except Exception as e:
                      print(f"⚠️ {gpu['name']} failed: {e}")
              if not created:
                  print("::error::All GPU options exhausted, could not create pod")
                  sys.exit(1)

          # --- Wait for Ollama to be healthy ---
          print("Waiting for Ollama to be healthy...")
          for i in range(36):
              try:
                  resp = r.get(OLLAMA_URL, timeout=10)
                  if resp.status_code == 200:
                      print("✅ Ollama is healthy!"); sys.exit(0)
              except Exception:
                  pass
              print(f"  Attempt {i+1}/36 - not ready yet, retrying in 10s...")
              time.sleep(10)
          print("::warning::Ollama not healthy after 6min, proceeding anyway")
          ENSURE_POD

      - name: Delete all geisters
        if: ${{ github.event.inputs.delete_all_agents == 'true' }}
        run: |
          echo "Deleting all agents from Geister API..."
          response=$(curl -s -X DELETE https://geister-api.realmsgos.dev/api/agents)
          echo "Response: $response"
          deleted=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deleted_count', 0))" 2>/dev/null || echo 'unknown')
          echo "Deleted $deleted agents"

      - name: Run geister agent swarm test on staging
        run: |
          # Store identity in a temporary file
          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem
          
          # Create logs directory for artifacts
          mkdir -p agent_logs
          
          # Pull the image
          docker pull ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }}
          
          # Run agent swarm test inside Docker container (needs dfx for registry list)
          docker run --rm \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/agent_logs:/app/agent_logs" \
            -v "$(pwd)/examples/demo/realm_common/tests/test_agent_swarm.py:/app/examples/demo/realm_common/tests/test_agent_swarm.py" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            -e DFX_NETWORK=staging \
            -e AGENTS_COUNT=${{ github.event.inputs.agents_count || '3' }} \
            -e NETWORK=staging \
            -e RUN_DURATION_MINUTES=${{ github.event.inputs.run_duration_minutes || '45' }} \
            -e LOGS_DIR=/app/agent_logs \
            ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }} \
            bash -c "dfx identity import my-identity /app/identity.pem --storage-mode=plaintext --force && \
                     dfx identity use my-identity && \
                     pip install realms-gos requests && \
                     cp dfx.template.json dfx.json && \
                     python examples/demo/realm_common/tests/test_agent_swarm.py"
          
          # Clean up
          rm identity.pem
      
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-logs
          path: agent_logs/
          retention-days: 14

      - name: Upload issues report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-issues-report
          path: agent_logs/issues-report.md
          retention-days: 14
          if-no-files-found: ignore
