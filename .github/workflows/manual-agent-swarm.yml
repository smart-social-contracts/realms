name: Agent Swarm (standalone)

on:
  workflow_dispatch:
    inputs:
      agents_count:
        description: 'Number of agents per realm'
        required: false
        default: '3'
      run_duration_minutes:
        description: 'Overall time budget in minutes'
        required: false
        default: '45'
      delete_all_agents:
        description: 'Delete all geisters (start fresh)'
        required: false
        type: boolean
        default: true

jobs:
  agent-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dfx
        run: |
          DFX_VERSION=0.32.0
          curl -fsSL "https://github.com/dfinity/sdk/releases/download/${DFX_VERSION}/dfx-${DFX_VERSION}-x86_64-linux.tar.gz" -o /tmp/dfx.tar.gz
          tar -xzf /tmp/dfx.tar.gz -C /usr/local/bin
          rm /tmp/dfx.tar.gz
          dfx --version

      - name: Install dependencies
        run: |
          pip install realms-gos requests geister

      - name: Configure dfx identity
        run: |
          echo "${{ secrets.IC_IDENTITY_PEM }}" > /tmp/identity.pem
          chmod 600 /tmp/identity.pem
          dfx identity import my-identity /tmp/identity.pem --storage-mode=plaintext --force
          dfx identity use my-identity
          rm -f /tmp/identity.pem
          echo "DFX_WARNING=-mainnet_plaintext_identity" >> "$GITHUB_ENV"

      - name: Ensure Ollama pod is running
        if: env.RUNPOD_API_KEY != ''
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          NETWORK_VOLUME_ID: "99taves6so"
        run: |
          geister pod start main --deploy-new --verbose
          
          echo "Waiting for Ollama to be healthy..."
          for i in $(seq 1 36); do
            if curl -sf --max-time 10 https://geister-ollama.realmsgos.dev > /dev/null 2>&1; then
              echo "✅ Ollama is healthy!"
              exit 0
            fi
            echo "  Attempt $i/36 - not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Ollama not healthy after 6min, proceeding anyway"

      - name: Delete all geisters
        if: ${{ github.event.inputs.delete_all_agents == 'true' }}
        run: |
          echo "Deleting all agents from Geister API..."
          response=$(curl -s -X DELETE https://geister-api.realmsgos.dev/api/agents)
          echo "Response: $response"
          deleted=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deleted_count', 0))" 2>/dev/null || echo 'unknown')
          echo "Deleted $deleted agents"

      - name: Run geister agent swarm test on staging
        env:
          DFX_NETWORK: staging
          AGENTS_COUNT: ${{ github.event.inputs.agents_count || '3' }}
          NETWORK: staging
          RUN_DURATION_MINUTES: ${{ github.event.inputs.run_duration_minutes || '45' }}
          LOGS_DIR: agent_logs
        run: |
          mkdir -p agent_logs
          python examples/demo/realm_common/tests/test_agent_swarm.py
      
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-logs
          path: agent_logs/
          retention-days: 14

      - name: Upload issues report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-issues-report
          path: agent_logs/issues-report.md
          retention-days: 14
          if-no-files-found: ignore
