name: Agent Swarm (standalone)

on:
  workflow_dispatch:
    inputs:
      agents_count:
        description: 'Number of agents per realm'
        required: false
        default: '3'
      run_duration_minutes:
        description: 'Overall time budget in minutes'
        required: false
        default: '45'
      delete_all_agents:
        description: 'Delete all geisters (start fresh)'
        required: false
        type: boolean
        default: true
      docker_tag:
        description: 'Docker image tag to use (default: demo-latest)'
        required: false
        default: 'demo-latest'

jobs:
  agent-swarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Ensure Ollama pod is running
        if: env.RUNPOD_API_KEY != ''
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          NETWORK_VOLUME_ID: "99taves6so"
        run: |
          pip install geister runpod
          geister pod start main --deploy-new --verbose
          
          echo "Waiting for Ollama to be healthy..."
          for i in $(seq 1 36); do
            if curl -sf --max-time 10 https://geister-ollama.realmsgos.dev > /dev/null 2>&1; then
              echo "✅ Ollama is healthy!"
              exit 0
            fi
            echo "  Attempt $i/36 - not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "::warning::Ollama not healthy after 6min, proceeding anyway"

      - name: Delete all geisters
        if: ${{ github.event.inputs.delete_all_agents == 'true' }}
        run: |
          echo "Deleting all agents from Geister API..."
          response=$(curl -s -X DELETE https://geister-api.realmsgos.dev/api/agents)
          echo "Response: $response"
          deleted=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin).get('deleted_count', 0))" 2>/dev/null || echo 'unknown')
          echo "Deleted $deleted agents"

      - name: Run geister agent swarm test on staging
        run: |
          # Store identity in a temporary file
          echo "${{ secrets.IC_IDENTITY_PEM }}" > identity.pem
          chmod 600 identity.pem
          
          # Create logs directory for artifacts
          mkdir -p agent_logs
          
          # Pull the image
          docker pull ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }}
          
          # Run agent swarm test inside Docker container (needs dfx for registry list)
          docker run --rm \
            -v "$(pwd)/identity.pem:/app/identity.pem" \
            -v "$(pwd)/agent_logs:/app/agent_logs" \
            -v "$(pwd)/examples/demo/realm_common/tests/test_agent_swarm.py:/app/examples/demo/realm_common/tests/test_agent_swarm.py" \
            -e DFX_WARNING="-mainnet_plaintext_identity" \
            -e DFX_NETWORK=staging \
            -e AGENTS_COUNT=${{ github.event.inputs.agents_count || '3' }} \
            -e NETWORK=staging \
            -e RUN_DURATION_MINUTES=${{ github.event.inputs.run_duration_minutes || '45' }} \
            -e LOGS_DIR=/app/agent_logs \
            ghcr.io/${{ github.repository_owner }}/realms:${{ github.event.inputs.docker_tag || 'demo-latest' }} \
            bash -c "icp identity import my-identity /app/identity.pem --storage-mode=plaintext --force && \
                     icp identity use my-identity && \
                     pip install realms-gos requests && \
                     cp dfx.template.json dfx.json && \
                     python examples/demo/realm_common/tests/test_agent_swarm.py"
          
          # Clean up
          rm identity.pem
      
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-logs
          path: agent_logs/
          retention-days: 14

      - name: Upload issues report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-swarm-issues-report
          path: agent_logs/issues-report.md
          retention-days: 14
          if-no-files-found: ignore
