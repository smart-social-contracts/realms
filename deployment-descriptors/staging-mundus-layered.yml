version: 2
network: staging

infra:
  file_registry_canister_id: iebdk-kqaaa-aaaau-agoxq-cai
  marketplace_canister_id: jji3o-uyaaa-aaaah-qreja-cai
  # Canonical Internet Identity derivationOrigin for the federation. Pinned into
  # each realm's canister_ids.js so every realm + the registry resolve to ONE
  # principal per human. Must list each realm frontend in its
  # /.well-known/ii-alternative-origins (served by the registry). See issue #233.
  ii_derivation_origin: https://staging.realmsgos.org

mundus:
  - name: dominion
    type: realm
    display_name: Dominion
    canister_id: ijdaw-dyaaa-aaaac-beh2a-cai
    frontend_canister_id: iocgc-oaaaa-aaaac-beh2q-cai
    manifest: examples/demo/realm1/manifest.json

  - name: dominion-token
    type: token
    display_name: Dominion Token
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/token_backend.wasm
    init_arg: '(record { name = "Dominion Token"; symbol = "DOM"; decimals = 8 : nat8; total_supply = 100_000_000_000_000_000 : nat; fee = 10_000 : nat; test = opt true })'

  - name: dominion-nft
    type: nft
    display_name: Dominion Land NFT
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/nft_backend.wasm
    init_arg: '(record { name = "Dominion Land"; symbol = "DLAND"; description = opt "Land ownership NFT for Dominion realm"; supply_cap = opt 10000 : opt nat; test = opt true })'

  - name: agora
    type: realm
    display_name: Agora
    canister_id: ihbn6-yiaaa-aaaac-beh3a-cai
    frontend_canister_id: iaalk-vqaaa-aaaac-beh3q-cai
    manifest: examples/demo/realm2/manifest.json

  - name: agora-token
    type: token
    display_name: Agora Token
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/token_backend.wasm
    init_arg: '(record { name = "Agora Token"; symbol = "AGO"; decimals = 8 : nat8; total_supply = 100_000_000_000_000_000 : nat; fee = 10_000 : nat; test = opt true })'

  - name: agora-nft
    type: nft
    display_name: Agora Land NFT
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/nft_backend.wasm
    init_arg: '(record { name = "Agora Land"; symbol = "ALAND"; description = opt "Land ownership NFT for Agora realm"; supply_cap = opt 10000 : opt nat; test = opt true })'

  - name: syntropia
    type: realm
    display_name: Syntropia
    canister_id: jnope-2yaaa-aaaac-beh4a-cai
    frontend_canister_id: jkpjq-xaaaa-aaaac-beh4q-cai
    manifest: examples/demo/realm3/manifest.json

  - name: syntropia-token
    type: token
    display_name: Syntropia Token
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/token_backend.wasm
    init_arg: '(record { name = "Syntropia Token"; symbol = "SYN"; decimals = 8 : nat8; total_supply = 100_000_000_000_000_000 : nat; fee = 10_000 : nat; test = opt true })'

  - name: syntropia-nft
    type: nft
    display_name: Syntropia Land NFT
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/download/v0.1.0/nft_backend.wasm
    init_arg: '(record { name = "Syntropia Land"; symbol = "SLAND"; description = opt "Land ownership NFT for Syntropia realm"; supply_cap = opt 10000 : opt nat; test = opt true })'

parameters:
  TEST_MODE: true
  TEST_MODE_USER_SELF_REGISTRATION: true
  TEST_MODE_DEMO_DATA: true
