  TEST_MODE_SKIP_AUTHENTICATION: true
  TEST_MODE_II_BYPASS: true
  TEST_MODE_USER_SELF_REGISTRATION: true
  TEST_MODE_DEMO_DATA: true
  TEST_MODE_SKIP_TERMS: true
  TEST_MODE_SKIP_PASSPORT_ZKPROOF: true
  INVITATION_CODE_MODE: true
