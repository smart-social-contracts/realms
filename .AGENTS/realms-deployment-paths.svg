<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1180" viewBox="0 0 1400 1180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0d9488"/>
    </marker>
  </defs>

  <rect width="1400" height="1180" fill="url(#bg)"/>

  <!-- Header -->
  <text x="48" y="48" font-size="26" font-weight="700" fill="#0f172a" font-family="system-ui,sans-serif">Realms deployment paths</text>
  <text x="48" y="72" font-size="13" fill="#64748b" font-family="system-ui,sans-serif">Quick reference - test / demo / staging on IC mainnet - source: realms/AGENTS.md</text>

  <!-- Decision box -->
  <g filter="url(#shadow)">
    <rect x="48" y="96" width="1304" height="72" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="68" y="122" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">What changed?</text>
    <text x="68" y="144" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Realm code - Casals or off-chain mundus | Extension/codex - deploy-files + install | Infra/registry - Casals publish-build + rollout | Casals UI - casals-upgrade</text>
    <text x="68" y="160" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Default for full orchestra: mode=upgrade (preserves state). reinstall wipes canisters.</text>
  </g>

  <!-- PATH 1: CASALS -->
  <g filter="url(#shadow)">
    <rect x="48" y="192" width="420" height="420" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="48" y="192" width="420" height="36" rx="12" fill="#2563eb"/>
    <rect x="48" y="216" width="420" height="12" fill="#2563eb"/>
    <text x="68" y="216" font-size="15" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">1. Casals path (authoritative)</text>
    <text x="380" y="216" font-size="9" font-weight="700" fill="#bfdbfe" text-anchor="end" font-family="system-ui,sans-serif">PREFERRED - FULL ORCHESTRA</text>
  </g>

  <rect x="68" y="244" width="380" height="52" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="82" y="264" font-size="10" fill="#334155" font-family="ui-monospace,monospace">publish-build.yml</text>
  <text x="82" y="282" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Build WASM/bundle - file_registry - authorize in Casals catalog</text>

  <line x1="258" y1="296" x2="258" y2="316" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="68" y="318" width="380" height="52" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="82" y="338" font-size="10" fill="#334155" font-family="ui-monospace,monospace">rollout.yml / realms rollout</text>
  <text x="82" y="356" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Casals upgrade_to: snapshot - install - verify - rollback on fail</text>

  <text x="68" y="392" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Upgrades</text>
  <text x="68" y="410" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[yes] Realms (Agora, Dominion, Syntropia) - backend + frontend</text>
  <text x="68" y="428" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[yes] Infra: installer, realm-registry, file_registry, marketplace, dashboard</text>
  <text x="68" y="446" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[yes] Extensions/codices (via active Casals arrangement after rollout)</text>

  <text x="68" y="474" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Key inputs</text>
  <text x="68" y="492" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f family=realm|registry|installer|...</text>
  <text x="68" y="508" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f targets=all-realms|all-infra|all|dominion</text>
  <text x="68" y="524" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f mode=upgrade  -f version=main|0.4.0|latest</text>
  <text x="68" y="540" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f from_main=true  (main-branch snapshots)</text>

  <rect x="68" y="556" width="380" height="44" rx="6" fill="#dbeafe" stroke="#93c5fd"/>
  <text x="82" y="576" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Casals controls orchestra canisters (realms + infra). CycleOps tops up cycles.</text>
  <text x="82" y="592" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Sections: Deployments (realms) | Infra (platform canisters)</text>

  <!-- PATH 2: OFF-CHAIN MUNDUS -->
  <g filter="url(#shadow)">
    <rect x="488" y="192" width="420" height="420" rx="12" fill="#f0fdfa" stroke="#5eead4"/>
    <rect x="488" y="192" width="420" height="36" rx="12" fill="#0d9488"/>
    <rect x="488" y="216" width="420" height="12" fill="#0d9488"/>
    <text x="508" y="216" font-size="15" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">2. Off-chain mundus (fast)</text>
    <text x="880" y="216" font-size="9" font-weight="700" fill="#99f6e4" text-anchor="end" font-family="system-ui,sans-serif">~90s / REALM</text>
  </g>

  <rect x="508" y="244" width="380" height="52" rx="8" fill="#ffffff" stroke="#99f6e4"/>
  <text x="522" y="264" font-size="10" fill="#334155" font-family="ui-monospace,monospace">deploy-mundus.yml / realms mundus deploy</text>
  <text x="522" y="282" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Descriptor YAML - registry.request_deployment - installer - deploy service</text>

  <line x1="698" y1="296" x2="698" y2="316" stroke="#0d9488" stroke-width="2" marker-end="url(#arrow-teal)"/>

  <rect x="508" y="318" width="380" height="68" rx="8" fill="#ffffff" stroke="#99f6e4"/>
  <text x="522" y="338" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Per env descriptor</text>
  <text x="522" y="356" font-size="10" fill="#334155" font-family="ui-monospace,monospace">test-mundus-layered.yml</text>
  <text x="522" y="372" font-size="10" fill="#334155" font-family="ui-monospace,monospace">demo-mundus-layered.yml / staging-mundus-layered.yml</text>

  <text x="508" y="408" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Upgrades</text>
  <text x="508" y="426" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[yes] Realm backends + frontends (3 realms per env)</text>
  <text x="508" y="444" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[yes] Extensions + codices (from file_registry via manifest)</text>
  <text x="508" y="462" font-size="11" fill="#475569" font-family="system-ui,sans-serif">[no]  Registry UI, installer, file_registry, marketplace, dashboard</text>

  <text x="508" y="490" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Key inputs</text>
  <text x="508" y="508" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f deploy_mode=upgrade  (NOT reinstall)</text>
  <text x="508" y="524" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f artifact_version=build|latest|0.4.0</text>
  <text x="508" y="540" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f realm=  (blank = all 3 realms, parallel matrix)</text>

  <rect x="508" y="556" width="380" height="44" rx="6" fill="#ccfbf1" stroke="#5eead4"/>
  <text x="522" y="576" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Full off-chain pipeline (infra too): scripts/ci_install_mundus.py stages 0-3</text>
  <text x="522" y="592" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">See local-mundus.yml - not wired into deploy-mundus.yml for mainnet</text>

  <!-- PATH 3: CASALS UPGRADE -->
  <g filter="url(#shadow)">
    <rect x="928" y="192" width="424" height="200" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
    <rect x="928" y="192" width="424" height="36" rx="12" fill="#7c3aed"/>
    <rect x="928" y="216" width="424" height="12" fill="#7c3aed"/>
    <text x="948" y="216" font-size="15" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">3. Casals orchestrator upgrade</text>
  </g>
  <rect x="948" y="244" width="384" height="52" rx="8" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="962" y="264" font-size="10" fill="#334155" font-family="ui-monospace,monospace">casals-upgrade.yml</text>
  <text x="962" y="282" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Upgrades casals_backend + casals_frontend (Casals repo checkout)</text>
  <text x="948" y="318" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Separate from rollout - this is the conductor, not the orchestra.</text>
  <text x="948" y="336" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Example: cycles UI, Casals admin. Per env: test, demo, staging.</text>
  <text x="948" y="360" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f components=backend,frontend  -f mode=upgrade</text>
  <text x="948" y="376" font-size="10" fill="#334155" font-family="ui-monospace,monospace">-f casals_ref=main</text>

  <!-- EXTENSIONS + RELEASE -->
  <g filter="url(#shadow)">
    <rect x="928" y="408" width="424" height="204" rx="12" fill="#fff7ed" stroke="#fdba74"/>
    <rect x="928" y="408" width="424" height="36" rx="12" fill="#ea580c"/>
    <rect x="928" y="432" width="424" height="12" fill="#ea580c"/>
    <text x="948" y="432" font-size="15" font-weight="700" fill="#ffffff" font-family="system-ui,sans-serif">4. Extensions / 5. Release</text>
  </g>
  <text x="948" y="464" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Extension / codex change only</text>
  <text x="948" y="482" font-size="10" fill="#334155" font-family="ui-monospace,monospace">deploy-files.yml - install on realm</text>
  <text x="948" y="498" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Publish bundles to file_registry (per env!). Fast local: realms files build + publish + dfx call (~26s)</text>
  <text x="948" y="524" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Semver release (artifacts + PyPI + GitHub)</text>
  <text x="948" y="542" font-size="10" fill="#334155" font-family="ui-monospace,monospace">release.yml  -f release_type=patch|minor|major</text>
  <text x="948" y="558" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Bumps version.txt, realm WASM tarball, CLI on PyPI - independent of rollout</text>
  <text x="948" y="584" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Use version=latest on rollout for newest semver; version=main for main snapshots</text>

  <!-- LAYERED ARCHITECTURE -->
  <g filter="url(#shadow)">
    <rect x="48" y="636" width="1304" height="108" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="68" y="662" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Layered architecture (what gets deployed into a realm)</text>
  </g>
  <rect x="68" y="676" width="400" height="52" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="82" y="696" font-size="12" font-weight="600" fill="#92400e" font-family="system-ui,sans-serif">Layer 1 - Base WASM</text>
  <text x="82" y="714" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">realm_backend - file_registry - installed by installer or Casals</text>

  <rect x="488" y="676" width="400" height="52" rx="6" fill="#fce7f3" stroke="#f9a8d4"/>
  <text x="502" y="696" font-size="12" font-weight="600" fill="#9d174d" font-family="system-ui,sans-serif">Layer 2 - Extensions and codices</text>
  <text x="502" y="714" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">ESM bundles + Python modules - file_registry - runtime-loaded by realm_frontend</text>

  <rect x="908" y="676" width="424" height="52" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="922" y="696" font-size="12" font-weight="600" fill="#065f46" font-family="system-ui,sans-serif">Layer 3 - Realm data</text>
  <text x="922" y="714" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Members, votes, treasuries - stable memory - preserved on upgrade, wiped on reinstall</text>

  <!-- COVERAGE MATRIX -->
  <g filter="url(#shadow)">
    <rect x="48" y="764" width="1304" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="68" y="792" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Coverage comparison</text>
  </g>

  <rect x="68" y="804" width="1216" height="28" rx="4" fill="#f1f5f9"/>
  <text x="82" y="822" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Component</text>
  <text x="520" y="822" font-size="12" font-weight="600" fill="#334155" text-anchor="middle" font-family="system-ui,sans-serif">Casals publish + rollout</text>
  <text x="820" y="822" font-size="12" font-weight="600" fill="#334155" text-anchor="middle" font-family="system-ui,sans-serif">Off-chain mundus</text>
  <text x="1120" y="822" font-size="12" font-weight="600" fill="#334155" text-anchor="middle" font-family="system-ui,sans-serif">deploy-files only</text>

  <line x1="68" y1="848" x2="1284" y2="848" stroke="#e2e8f0"/>
  <text x="82" y="866" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Realm apps (Agora, Dominion, Syntropia)</text>
  <text x="520" y="866" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes</text>
  <text x="820" y="866" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes</text>
  <text x="1120" y="866" font-size="11" fill="#dc2626" text-anchor="middle" font-family="system-ui,sans-serif">no</text>

  <line x1="68" y1="878" x2="1284" y2="878" stroke="#e2e8f0"/>
  <text x="82" y="896" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Extensions / codices on realms</text>
  <text x="520" y="896" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes (arrangement)</text>
  <text x="820" y="896" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes (manifest)</text>
  <text x="1120" y="896" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes (+ install)</text>

  <line x1="68" y1="908" x2="1284" y2="908" stroke="#e2e8f0"/>
  <text x="82" y="926" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Realm registry (backend + frontend footer)</text>
  <text x="520" y="926" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes (family=registry)</text>
  <text x="820" y="926" font-size="11" fill="#dc2626" text-anchor="middle" font-family="system-ui,sans-serif">no</text>
  <text x="1120" y="926" font-size="11" fill="#dc2626" text-anchor="middle" font-family="system-ui,sans-serif">no</text>

  <line x1="68" y1="938" x2="1284" y2="938" stroke="#e2e8f0"/>
  <text x="82" y="956" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Installer, file_registry, marketplace, dashboard</text>
  <text x="520" y="956" font-size="11" fill="#16a34a" text-anchor="middle" font-family="system-ui,sans-serif">yes (all-infra)</text>
  <text x="820" y="956" font-size="11" fill="#dc2626" text-anchor="middle" font-family="system-ui,sans-serif">no</text>
  <text x="1120" y="956" font-size="11" fill="#dc2626" text-anchor="middle" font-family="system-ui,sans-serif">no</text>

  <!-- ENVIRONMENTS + ACTORS -->
  <g filter="url(#shadow)">
    <rect x="48" y="984" width="640" height="156" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="68" y="1012" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Environments (all on IC mainnet)</text>
    <text x="68" y="1036" font-size="11" fill="#475569" font-family="system-ui,sans-serif">test, demo, staging - each has own file_registry, Casals, registry, 3 realms</text>
    <text x="68" y="1058" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Canister IDs: realms/canister_ids.json, AGENTS.md Known Canister IDs</text>
    <text x="68" y="1080" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Casals families (publish-build)</text>
    <text x="68" y="1098" font-size="10" fill="#334155" font-family="ui-monospace,monospace">realm, installer, registry, file-registry, dashboard, marketplace</text>
    <text x="68" y="1118" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Artifacts: family-backend@version, family-assets@version</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="712" y="984" width="640" height="156" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="732" y="1012" font-size="12" font-weight="600" fill="#334155" font-family="system-ui,sans-serif">Key canisters and workflows</text>
    <text x="732" y="1034" font-size="11" fill="#475569" font-family="system-ui,sans-serif">file_registry - artifact store (WASM, extension bundles)</text>
    <text x="732" y="1052" font-size="11" fill="#475569" font-family="system-ui,sans-serif">realm_installer - off-chain deploy worker, chunked WASM install</text>
    <text x="732" y="1070" font-size="11" fill="#475569" font-family="system-ui,sans-serif">realm_registry - credits, catalog, request_deployment queue</text>
    <text x="732" y="1088" font-size="11" fill="#475569" font-family="system-ui,sans-serif">Casals - on-chain orchestrator; upgrade_to with snapshot/rollback</text>
    <text x="732" y="1110" font-size="10" fill="#334155" font-family="ui-monospace,monospace">.github/workflows/: publish-build, rollout, deploy-mundus, casals-upgrade, deploy-files</text>
  </g>

  <!-- Legend -->
  <rect x="48" y="1156" width="1304" height="1" fill="#e2e8f0"/>
  <circle cx="64" cy="1170" r="5" fill="#2563eb"/>
  <text x="76" y="1174" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Casals = full orchestra</text>
  <circle cx="220" cy="1170" r="5" fill="#0d9488"/>
  <text x="232" y="1174" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">Mundus = fast realms</text>
  <circle cx="380" cy="1170" r="5" fill="#7c3aed"/>
  <text x="392" y="1174" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">casals-upgrade = conductor UI</text>
  <circle cx="580" cy="1170" r="5" fill="#ea580c"/>
  <text x="592" y="1174" font-size="10" fill="#64748b" font-family="system-ui,sans-serif">deploy-files = extension bundles</text>
  <text x="1352" y="1174" font-size="10" fill="#64748b" text-anchor="end" font-family="system-ui,sans-serif">Docs: realms/AGENTS.md, docs/reference/CASALS_ROLLOUT.md</text>
</svg>
