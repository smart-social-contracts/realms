# Unified deployment descriptor — Full mundus deploy to staging
# Usage: realms deploy --file deployments/staging-mundus.yml
# See: https://github.com/smart-social-contracts/realms/issues/160
version: 1

object:
  type: mundus
  subtypes: all
  manifest: ./examples/demo/manifest.json
  core_codebase:
    path: ./src
  extensions_codebase:
    path: bundled
  codices_codebase:
    path: bundled
  network: staging
  mode: upgrade
  parameters:
    TEST_MODE: true
    TEST_MODE_II_BYPASS: true
    TEST_MODE_ADMIN_SELF_REGISTRATION: true
    TEST_MODE_DEMO_DATA: false
    TEST_MODE_SKIP_TERMS: true
