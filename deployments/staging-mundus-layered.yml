# Mundus descriptor — STAGING (smart-social-contracts staging IC subnet).
#
# Same schema as deployments/local-mundus.yml. The infrastructure canisters
# already exist on staging (file_registry, realm_installer, etc.) so the
# bootstrap stage is a no-op for them — the workflow just verifies they
# respond and that realm_installer is a controller of every member.
#
# Triggered by .github/workflows/ci-main.yml on every push to main, and
# manually by .github/workflows/layered-deploy-dominion.yml.

version: 2
network: staging

# Pre-existing infrastructure on the staging subnet.
# These are NOT installed by CI; they're long-lived. CI only verifies them.
infrastructure_overrides:
  file_registry:
    canister_id: iebdk-kqaaa-aaaau-agoxq-cai
  file_registry_frontend:
    canister_id: rbex3-xyaaa-aaaah-qumma-cai
  realm_installer:
    canister_id: lusjm-wqaaa-aaaau-ago7q-cai

artifacts:
  base_wasm:
    source: src/realm_backend
    version: ${{ inputs.base_wasm_version || github.sha }}
  extensions: all
  codices: all

# Pre-existing staging canisters. CI reuses these on every run; it never
# creates new ones. The only canister that doesn't already exist is
# realm_installer (see infrastructure_overrides).
mundus:
  - name: realm_registry_backend
    type: realm_registry
    canister_id: 7wzxh-wyaaa-aaaau-aggyq-cai
    extensions: []
    codices: []

  # Codex installation is an admin-bound, one-time operation per realm —
  # not something CI should re-run on every push. Stage 1 still publishes
  # all codices to file_registry; admins install them once via the realms
  # CLI / file_registry UI. CI refreshes base WASM + extensions only.
  - name: dominion
    type: realm
    canister_id: ijdaw-dyaaa-aaaac-beh2a-cai
    manifest: examples/demo/realm1/manifest.json
    extensions: inherit_from_artifacts
    codices: []

  - name: agora
    type: realm
    canister_id: ihbn6-yiaaa-aaaac-beh3a-cai
    manifest: examples/demo/realm2/manifest.json
    extensions: inherit_from_artifacts
    codices: []

  - name: syntropia
    type: realm
    canister_id: jnope-2yaaa-aaaac-beh4a-cai
    manifest: examples/demo/realm3/manifest.json
    extensions: inherit_from_artifacts
    codices: []

verify:
  e2e_specs:
    - tests/e2e/specs/layered-parity.spec.ts
  # The existing tests/integration/* and tests/backend/* suites all
  # invoke `dfx canister call ... realm_backend ...` against an
  # *implicit local* replica with seeded data — they're authoring-time
  # fixtures, not staging-deploy verifiers. Staging verification is
  # done end-to-end through Playwright in the e2e job above. A proper
  # @dfinity/agent-based integration suite for staging is tracked
  # separately.
  integration_tests: []
