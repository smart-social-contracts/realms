# Mundus descriptor — STAGING (smart-social-contracts staging IC subnet).
#
# Same schema as deployments/local-mundus.yml. The infrastructure canisters
# already exist on staging (file_registry, realm_installer, etc.) so the
# bootstrap stage is a no-op for them — the workflow just verifies they
# respond and that realm_installer is a controller of every member.
#
# Triggered by .github/workflows/ci-main.yml on every push to main, and
# manually by .github/workflows/layered-deploy-dominion.yml.

version: 2
network: staging

# Pre-existing infrastructure on the staging subnet.
# These are NOT installed by CI; they're long-lived.  CI only verifies
# them (stage 0 skips `dfx deploy` when a canister_id is pinned).
#
# realm_installer is pinned but ALSO upgraded by bootstrap-infra (see
# the "Upgrade realm_installer" step) so it always matches the code on
# main so queue/callback endpoints stay in sync with worker + registry.
infrastructure_overrides:
  file_registry:
    canister_id: iebdk-kqaaa-aaaau-agoxq-cai
  file_registry_frontend:
    canister_id: rbex3-xyaaa-aaaah-qumma-cai
  realm_installer:
    canister_id: lusjm-wqaaa-aaaau-ago7q-cai

artifacts:
  base_wasm:
    source: src/realm_backend
    version: ${{ inputs.base_wasm_version || github.sha }}
  extensions: all
  codices: all

# Pre-existing staging canisters. CI reuses these on every run; it never
# creates new ones. The only canister that doesn't already exist is
# realm_installer (see infrastructure_overrides).
mundus:
  - name: realm_registry_backend
    type: realm_registry
    canister_id: 7wzxh-wyaaa-aaaau-aggyq-cai
    frontend_canister_id: 77243-aqaaa-aaaau-aggza-cai
    extensions: []
    codices: []

  - name: dominion
    type: realm
    display_name: Dominion
    canister_id: ijdaw-dyaaa-aaaac-beh2a-cai
    frontend_canister_id: iocgc-oaaaa-aaaac-beh2q-cai
    manifest: examples/demo/realm1/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: agora
    type: realm
    display_name: Agora
    canister_id: ihbn6-yiaaa-aaaac-beh3a-cai
    frontend_canister_id: iaalk-vqaaa-aaaac-beh3q-cai
    manifest: examples/demo/realm2/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: syntropia
    type: realm
    display_name: Syntropia
    canister_id: jnope-2yaaa-aaaac-beh4a-cai
    frontend_canister_id: jkpjq-xaaaa-aaaac-beh4q-cai
    manifest: examples/demo/realm3/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: marketplace_backend
    type: marketplace
    canister_id: jji3o-uyaaa-aaaah-qreja-cai
    frontend_canister_id: joj52-zaaaa-aaaah-qrejq-cai
    extensions: []
    codices: []

  - name: platform_dashboard_frontend
    type: dashboard
    frontend_canister_id: dpgu3-wqaaa-aaaau-agqoa-cai

  - name: token_backend
    type: token
    canister_id: 2rqin-xaaaa-aaaah-qunsq-cai
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/latest/download/token_backend.wasm
    init_arg: '(record { name = "Realms Token"; symbol = "RLM"; decimals = 8 : nat8; total_supply = 1_000_000_000 : nat; fee = 10_000 : nat; test = opt true })'
    extensions: []
    codices: []

  - name: nft_backend
    type: nft
    canister_id: 27sff-mqaaa-aaaah-quntq-cai
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/latest/download/nft_backend.wasm
    init_arg: '(record { name = "Realms Land"; symbol = "RLAND"; description = opt "Land ownership NFT for Realms"; supply_cap = opt (10_000 : nat); test = opt true })'
    extensions: []
    codices: []

verify:
  e2e_specs:
    - tests/e2e/specs/layered-parity.spec.ts
  # The existing tests/integration/* and tests/backend/* suites all
  # invoke `dfx canister call ... realm_backend ...` against an
  # *implicit local* replica with seeded data — they're authoring-time
  # fixtures, not staging-deploy verifiers. Staging verification is
  # done end-to-end through Playwright in the e2e job above. A proper
  # @dfinity/agent-based integration suite for staging is tracked
  # separately.
  integration_tests: []
