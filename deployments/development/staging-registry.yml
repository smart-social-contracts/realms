# Unified deployment descriptor — Registry deploy to staging
# Usage: realms deploy --file deployments/staging-registry.yml
# See: https://github.com/smart-social-contracts/realms/issues/160
version: 1

object:
  type: registry
  subtypes: backend, frontend
  manifest: ./examples/demo/registry/manifest.json
  core_codebase:
    path: ./src
  extensions_codebase:
    path: none
  codices_codebase:
    path: none
  network: staging
  mode: upgrade
  parameters:
    TEST_MODE: true
    TEST_MODE_II_BYPASS: true
    TEST_MODE_ADMIN_SELF_REGISTRATION: true
    TEST_MODE_SKIP_TERMS: true
