# Unified deployment descriptor — Frontend upgrade for Dominion on staging.
#
# Pins the target by canister ID so it is unambiguous (see header of
# staging-dominion-backend.yml for the rationale).
#
# Usage:
#   gh workflow run Deploy --repo smart-social-contracts/realms \
#       --ref feat/layered-deployment \
#       -f descriptor=deployments/staging-dominion-frontend.yml \
#       -f source=checkout -f commit=<sha>
#
# Related: https://github.com/smart-social-contracts/realms/issues/168
version: 1

object:
  type: realm
  subtypes: frontend
  quarters: 1
  manifest: ./examples/demo/realm1/manifest.json
  core_codebase:
    path: ./src
  extensions_codebase:
    path: none
  codices_codebase:
    path: none
  network: staging
  id_in_registry: ijdaw-dyaaa-aaaac-beh2a-cai
  mode: reinstall
  parameters:
    TEST_MODE: true
    TEST_MODE_II_BYPASS: true
    TEST_MODE_ADMIN_SELF_REGISTRATION: true
    TEST_MODE_SKIP_TERMS: true
