# Mundus descriptor — TEST (IC mainnet, dedicated CycleOps-provisioned canisters).
# Same layout as staging-mundus-layered.yml. Principals come from
# scripts/cycleops/test_env_cycleops_ids.tsv (provision_test_env_cycleops.sh).
#
version: 2
network: test

infrastructure_overrides:
  file_registry:
    canister_id: uq2mu-kaaaa-aaaah-avqcq-cai
  file_registry_frontend:
    canister_id: 2no7h-xqaaa-aaaad-qlxeq-cai
  realm_installer:
    canister_id: fltjm-tyaaa-aaaap-qunhq-cai

artifacts:
  base_wasm:
    source: src/realm_backend
    version: ${{ inputs.base_wasm_version || github.sha }}
  extensions: all
  codices: all

mundus:
  - name: realm_registry_backend
    type: realm_registry
    canister_id: yhw3g-fyaaa-aaaas-qgorq-cai
    frontend_canister_id: qtank-3qaaa-aaaaa-qhb6q-cai
    extensions: []
    codices: []

  - name: dominion
    type: realm
    display_name: Dominion
    canister_id: ku6cv-2iaaa-aaaab-agrpa-cai
    frontend_canister_id: 2enu3-byaaa-aaaad-qlxfa-cai
    manifest: examples/demo/realm1/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: agora
    type: realm
    display_name: Agora
    canister_id: rnghe-haaaa-aaaak-qyxyq-cai
    frontend_canister_id: pqwsi-vyaaa-aaaau-agrbq-cai
    manifest: examples/demo/realm2/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: syntropia
    type: realm
    display_name: Syntropia
    canister_id: m2wv3-uaaaa-aaaah-quoiq-cai
    frontend_canister_id: 2dmsp-maaaa-aaaad-qlxfq-cai
    manifest: examples/demo/realm3/manifest.json
    extensions: inherit_from_artifacts
    codices: []
    register_with_registry: true

  - name: marketplace_backend
    type: marketplace
    canister_id: 2wldc-niaaa-aaaad-qlxga-cai
    frontend_canister_id: mxyd5-3qaaa-aaaao-ba2xq-cai
    extensions: []
    codices: []

  - name: platform_dashboard_frontend
    type: dashboard
    frontend_canister_id: em2mz-rqaaa-aaaag-ayt7q-cai

  - name: token_backend
    type: token
    canister_id: nusyl-jiaaa-aaaae-qj6mq-cai
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/latest/download/token_backend.wasm
    init_arg: '(record { name = "Realms Token"; symbol = "RLM"; decimals = 8 : nat8; total_supply = 1_000_000_000 : nat; fee = 10_000 : nat; test = opt true })'
    extensions: []
    codices: []

  - name: nft_backend
    type: nft
    canister_id: eelas-yyaaa-aaaao-qps7a-cai
    wasm_url: https://github.com/smart-social-contracts/ic-tokens/releases/latest/download/nft_backend.wasm
    init_arg: '(record { name = "Realms Land"; symbol = "RLAND"; description = opt "Land ownership NFT for Realms"; supply_cap = opt (10_000 : nat); test = opt true })'
    extensions: []
    codices: []

verify:
  e2e_specs:
    - tests/e2e/specs/layered-parity.spec.ts
  integration_tests: []
