<!DOCTYPE html>
<html lang="en" class="bg-slate-900 text-slate-100">
<head>
  <meta charset="utf-8" />
  <title>IC File Registry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2360a5fa'%3E%3Cpath d='M19 4H9l-2-2H3a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V6a2 2 0 00-2-2zm-7 11l-4-4h2.5V8h3v3H16l-4 4z'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./app.css" />
</head>
<body class="min-h-screen flex flex-col">
  <!-- Top bar -->
  <header class="border-b border-slate-700 bg-slate-800/60 backdrop-blur sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-4">
      <div class="flex items-center gap-2 text-xl font-semibold">
        <svg class="w-7 h-7 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4H9l-2-2H3a2 2 0 00-2 2v14a2 2 0 002 2h18a2 2 0 002-2V6a2 2 0 00-2-2zm-7 11l-4-4h2.5V8h3v3H16l-4 4z"/></svg>
        <span>IC File Registry</span>
      </div>
      <div class="flex-1"></div>
      <span id="canisterPill" class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-300 font-mono"></span>
      <span id="principalPill" class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-300 font-mono hidden"></span>
      <button id="loginBtn" class="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-sm font-medium transition">
        Login with Internet Identity
      </button>
      <button id="logoutBtn" class="px-3 py-1.5 rounded bg-slate-700 hover:bg-slate-600 text-sm font-medium transition hidden">
        Log out
      </button>
    </div>
  </header>

  <!-- Stats row -->
  <section class="max-w-7xl mx-auto w-full px-6 mt-6 grid grid-cols-3 gap-4">
    <div class="rounded-lg bg-slate-800 border border-slate-700 p-4">
      <div class="text-slate-400 text-sm uppercase tracking-wider">Namespaces</div>
      <div id="statNamespaces" class="text-3xl font-bold mt-1">—</div>
    </div>
    <div class="rounded-lg bg-slate-800 border border-slate-700 p-4">
      <div class="text-slate-400 text-sm uppercase tracking-wider">Total Files</div>
      <div id="statFiles" class="text-3xl font-bold mt-1">—</div>
    </div>
    <div class="rounded-lg bg-slate-800 border border-slate-700 p-4">
      <div class="text-slate-400 text-sm uppercase tracking-wider">Total Size</div>
      <div id="statBytes" class="text-3xl font-bold mt-1">—</div>
    </div>
  </section>

  <!-- Main -->
  <main class="max-w-7xl mx-auto w-full px-6 mt-6 mb-12 grid grid-cols-12 gap-6 flex-1">
    <!-- Left: namespaces list -->
    <aside class="col-span-4 rounded-lg bg-slate-800 border border-slate-700 flex flex-col">
      <div class="p-3 border-b border-slate-700 flex items-center gap-2">
        <input id="nsSearch" type="text" placeholder="Search namespaces…" class="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-1.5 text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button id="refreshBtn" title="Refresh" class="p-1.5 rounded bg-slate-700 hover:bg-slate-600 transition" aria-label="Refresh">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-15.5 6.36L3 16m0-4a9 9 0 0 1 15.5-6.36L21 8m0-5v5h-5M3 21v-5h5"/></svg>
        </button>
      </div>
      <div class="p-2 border-b border-slate-700">
        <button id="newNsBtn" class="w-full text-left px-3 py-2 rounded bg-blue-600/10 border border-blue-600/30 hover:bg-blue-600/20 text-sm flex items-center gap-2">
          <svg class="w-4 h-4 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          New namespace…
        </button>
      </div>
      <div id="nsList" class="overflow-y-auto flex-1 max-h-[70vh]"></div>
    </aside>

    <!-- Right: namespace details -->
    <section class="col-span-8 rounded-lg bg-slate-800 border border-slate-700 flex flex-col min-h-[60vh]">
      <div id="nsHeader" class="p-4 border-b border-slate-700 flex items-center gap-3">
        <div id="nsTitle" class="text-lg font-semibold flex-1 text-slate-400">Select a namespace</div>
        <button id="deleteNsBtn" class="hidden px-3 py-1.5 rounded bg-red-600/20 border border-red-600/40 hover:bg-red-600/40 text-sm text-red-300">Delete namespace</button>
      </div>

      <div id="nsBody" class="p-4 space-y-4">
        <p class="text-slate-500 text-sm">Pick a namespace from the left, or create a new one to start uploading files. Authenticated callers can write; anyone can read via the HTTP gateway.</p>
      </div>
    </section>
  </main>

  <footer class="border-t border-slate-800 text-center text-xs text-slate-500 py-3">
    <span>Powered by Basilisk &middot; <a id="ghLink" href="https://github.com/smart-social-contracts/realms" class="hover:text-slate-300">realms / file_registry</a></span>
  </footer>

  <!-- Toast region -->
  <div id="toasts" class="fixed bottom-4 right-4 space-y-2 z-50"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
